<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SchoolSphere - Owner Panel</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<!-- Crypto -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<style>
body { margin:0; font-family:'Segoe UI'; background:#f4f6f9; }

.header {
background: linear-gradient(135deg,#2c5364,#203a43,#0f2027);
padding:30px; text-align:center; color:white;
}

.app-name { font-size:36px; font-weight:bold; color:#ffd700; }
.tagline { font-size:14px; }

.container {
width:90%; max-width:450px;
margin:40px auto; background:white;
padding:25px; border-radius:15px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

input {
width:100%; padding:12px;
margin:10px 0; border-radius:8px;
border:1px solid #ddd;
}

button {
width:100%; padding:12px;
border:none; border-radius:20px;
font-size:16px; cursor:pointer;
}

.login-btn { background:#3498db; color:white; }
.register-btn { background:#27ae60; color:white; }

.toggle-link { cursor:pointer; margin-top:10px; display:block; color:#555; }

.hidden { display:none; }

.loader {
display:none;
color:green;
font-weight:bold;
margin-bottom:10px;
}
</style>
</head>

<body>

<div class="header">
<div class="app-name">SchoolSphere</div>
<div class="tagline">Smart School System</div>
</div>

<!-- LOGIN -->
<div class="container" id="loginSection">
<div class="loader" id="loginLoader">⏳ Login हो रहा है...</div>

<h2>Owner Login</h2>

<input id="loginID" placeholder="School ID (GPS001)"
oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')">

<input id="loginPassword" type="password" placeholder="Password">

<button class="login-btn" onclick="login()">Login</button>

<div class="toggle-link" onclick="showRegister()">New School? Register</div>
</div>

<!-- REGISTER -->
<div class="container hidden" id="registerSection">
<div class="loader" id="regLoader">⏳ Register हो रहा है...</div>

<h2>Register School</h2>

<input id="schoolName" placeholder="School Name">

<input id="schoolID" placeholder="School ID (GPS001)"
oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')">

<input id="mobile" placeholder="Mobile Number"
oninput="this.value=this.value.replace(/[^0-9]/g,'')">

<input id="password" type="password" placeholder="Password">

<button class="register-btn" onclick="register()">Register</button>

<div class="toggle-link" onclick="showLogin()">Already have account?</div>
</div>

<script>

// 🔥 Firebase Config (Same)
const firebaseConfig = {
apiKey: "AIzaSyBSgfU5OhUmLGwc6OBxgrudtZpqMCzgQpw",
databaseURL: "https://schoolsphere-824ca-default-rtdb.firebaseio.com/",
projectId: "schoolsphere-824ca"
};

if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🔐 Security Salt
const SALT = "SS_2026_SECURE";
function hash(p){ return CryptoJS.SHA256(p+SALT).toString(); }

// 🔄 Toggle
function showRegister(){
document.getElementById("loginSection").classList.add("hidden");
document.getElementById("registerSection").classList.remove("hidden");
}

function showLogin(){
document.getElementById("registerSection").classList.add("hidden");
document.getElementById("loginSection").classList.remove("hidden");
}

// ================= REGISTER =================
async function register(){

let name = document.getElementById("schoolName").value.trim();
let id = document.getElementById("schoolID").value.trim();
let mob = document.getElementById("mobile").value.trim();
let pass = document.getElementById("password").value.trim();

if(!name || !id || !mob || !pass){
alert("❌ सभी जानकारी भरें!");
return;
}

if(mob.length !== 10){
alert("❌ सही मोबाइल नंबर डालें!");
return;
}

document.getElementById("regLoader").style.display="block";

try{

let snap = await db.ref("Schools/"+id).once("value");

if(snap.exists()){
alert("❌ School ID पहले से मौजूद है!");
return;
}

// 🔥 Save
await db.ref("Schools/"+id).set({
schoolName:name,
ownerMobile:mob,
password:hash(pass),
status:"active",
loginAttempts:0,
createdAt:Date.now()
});

// 💾 Save Local
localStorage.setItem("activeSchoolID", id);
localStorage.setItem("schoolName", name);

alert("🎉 Registration Successful!");
showLogin();

}catch(e){
alert("Error: "+e.message);
}

document.getElementById("regLoader").style.display="none";
}

// ================= LOGIN =================
async function login(){

let id = document.getElementById("loginID").value.trim();
let pass = document.getElementById("loginPassword").value.trim();

if(!id || !pass){
alert("❌ ID और पासवर्ड भरें!");
return;
}

document.getElementById("loginLoader").style.display="block";

try{

let snap = await db.ref("Schools/"+id).once("value");

if(!snap.exists()){
alert("❌ School ID नहीं मिला!");
return;
}

let user = snap.val();

// 🚫 BLOCK CHECK
if(user.status === "blocked"){
alert("🚫 आपकी ID ब्लॉक है! Admin से संपर्क करें");
return;
}

let attempts = user.loginAttempts || 0;

// 🔐 LIMIT
if(attempts >= 3){
await db.ref("Schools/"+id).update({status:"blocked"});
alert("🚫 3 गलत कोशिश! ID ब्लॉक हो गई");
return;
}

// 🔑 PASSWORD MATCH
if(user.password === hash(pass)){

await db.ref("Schools/"+id).update({
loginAttempts:0,
lastLogin:Date.now()
});

localStorage.setItem("activeSchoolID", id);
localStorage.setItem("schoolName", user.schoolName);

alert("✅ Login Success!");
window.location.href="superadmin.html";

}else{

attempts++;

await db.ref("Schools/"+id).update({
loginAttempts:attempts
});

alert("❌ गलत पासवर्ड! बाकी: "+(3-attempts));
}

}catch(e){
alert("Error: "+e.message);
}

document.getElementById("loginLoader").style.display="none";
}

</script>

</body>
</html>
