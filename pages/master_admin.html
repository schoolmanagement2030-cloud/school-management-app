<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Admin - SchoolSphere Master</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root { 
    --dark:#0f172a; --gold:#ffd700; --danger:#ff4757; --success:#2ed573; 
    --blue:#1e90ff; --purple: #a55eea;
    --card-shadow: 0 10px 20px rgba(0,0,0,0.1);
}

body{ margin:0; font-family:'Poppins', sans-serif; background:#f1f2f6; color: var(--dark); }

.header{ 
    background: var(--dark); color:var(--gold); padding:25px; 
    text-align:center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
    font-size: 22px; font-weight: bold; border-bottom: 4px solid var(--gold);
}

.container{ padding:15px; max-width:1200px; margin:auto; }

/* 🔐 LOGIN OVERLAY */
#master-login-overlay { position: fixed; inset: 0; background: var(--dark); display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 20px; }
.login-card { background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 380px; text-align: center; border: 2px solid var(--gold); }
.login-card input { width: 90%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; }
.login-card button { width: 100%; background: var(--dark); color: var(--gold); padding: 14px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

/* REGISTRATION SECTION */
.reg-section { 
    background: white; padding: 20px; border-radius: 20px; 
    box-shadow: var(--card-shadow); margin-bottom: 25px; 
    border-left: 8px solid var(--purple); 
}
.input-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
.input-group input { flex: 1; min-width: 200px; padding: 12px; border-radius: 10px; border: 1px solid #ddd; outline: none; }
.btn-create { background: var(--purple); color:white; padding:12px 20px; border:none; border-radius:10px; font-weight:bold; cursor:pointer; }

/* 📱 SCHOOL CARDS GRID */
.cards-grid { 
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
    gap: 20px; 
    margin-top: 20px;
}

.school-card {
    background: white;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: var(--card-shadow);
    transition: 0.3s;
    border: 1px solid #e1e8ef;
}
.school-card:hover { transform: translateY(-5px); }

.card-top {
    background: #f8f9fa;
    padding: 15px;
    border-bottom: 1px solid #eee;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.school-id-label {
    background: var(--dark);
    color: var(--gold);
    padding: 5px 12px;
    border-radius: 8px;
    font-weight: 700;
    font-family: monospace;
    font-size: 18px;
}

.card-body { padding: 20px; }
.school-name-text { font-size: 20px; font-weight: 700; color: var(--dark); margin-bottom: 10px; display: block; }
.owner-info { display: flex; align-items: center; gap: 10px; color: #57606f; margin-bottom: 15px; }

.card-actions {
    padding: 15px 20px;
    background: #fafafa;
    display: flex;
    gap: 10px;
    justify-content: space-around;
    border-top: 1px dashed #ddd;
}

/* BUTTON STYLES */
.action-icon {
    width: 40px; height: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    border: none; cursor: pointer; transition: 0.2s; font-size: 18px;
}
.btn-wa { background: #25d366; color: white; }
.btn-block { background: var(--danger); color: white; }
.btn-unblock { background: var(--success); color: white; }
.btn-del { background: #747d8c; color: white; }

.status-badge {
    font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 20px; text-transform: uppercase;
}
.active-bg { background: #dff9fb; color: #130f40; border: 1px solid var(--success); }
.blocked-bg { background: #ffeaa7; color: #d63031; border: 1px solid var(--danger); }

#loader{ display:none; position:fixed; inset:0; background:rgba(15,23,42,0.9); color:var(--gold); align-items:center; justify-content:center; z-index: 10000; flex-direction: column; }
</style>
</head>

<body>

<div id="master-login-overlay">
    <div class="login-card">
        <h2>Master Control Access</h2>
        <input type="text" id="masterUser" placeholder="Mobile">
        <input type="password" id="masterPass" placeholder="Password">
        <button id="loginBtn" onclick="handleMasterLogin()">Login Master Panel</button>
        <p id="error-msg" style="color:red; margin-top:10px; display:none;">गलत आईडी या पासवर्ड!</p>
    </div>
</div>

<div id="loader">
    <i class="fas fa-sync fa-spin" style="font-size: 50px;"></i>
    <p style="margin-top:15px;">डेटा लोड हो रहा है...</p>
</div>

<div class="header">
    <i class="fas fa-shield-alt"></i> SCHOOLSPHERE MASTER
</div>

<div class="container">
    <div class="reg-section">
        <h3 style="margin:0;"><i class="fas fa-plus-circle"></i> नई स्कूल जोड़ें</h3>
        <div class="input-group">
            <input type="text" id="newSchoolName" placeholder="स्कूल का नाम">
            <input type="number" id="newOwnerMobile" placeholder="ओनर का मोबाइल">
            <button class="btn-create" onclick="createNewSchool()">ID जेनरेट करें</button>
        </div>
    </div>

    <div style="margin-bottom: 20px;">
        <input type="text" id="searchBar" onkeyup="filterCards()" placeholder="🔍 सर्च स्कूल (नाम या ID)..." style="width:100%; padding:15px; border-radius:15px; border:1px solid #ccc; box-sizing:border-box;">
    </div>

    <div class="cards-grid" id="cardsList">
        </div>
</div>

<script>
// FIREBASE CONFIG
const config={
    apiKey:"AIzaSyBSgfU5OhUmLGwc6OBxgrudtZpqMCzgQpw",
    databaseURL:"https://schoolsphere-824ca-default-rtdb.firebaseio.com/",
    projectId:"schoolsphere-824ca"
};
if(!firebase.apps.length) firebase.initializeApp(config);
const db=firebase.database();
const auth=firebase.auth();

function handleMasterLogin() {
    const mobile = document.getElementById("masterUser").value.trim();
    const pass = document.getElementById("masterPass").value;
    const email = mobile + "@master.com";
    auth.signInWithEmailAndPassword(email, pass)
    .then(() => { document.getElementById("master-login-overlay").style.display = "none"; })
    .catch(() => { document.getElementById("error-msg").style.display = "block"; });
}

function generateSmartID(schoolName) {
    let sn = schoolName.trim().toUpperCase().slice(0,3);
    let num = Math.floor(100 + Math.random() * 899);
    return sn + num;
}

function createNewSchool() {
    let name = document.getElementById("newSchoolName").value.trim();
    let mobile = document.getElementById("newOwnerMobile").value.trim();
    if(!name || mobile.length < 10) { alert("विवरण सही भरें!"); return; }
    
    document.getElementById("loader").style.display="flex";
    let schoolID = generateSmartID(name);
    
    db.ref("Schools/" + schoolID).set({
        schoolName: name, ownerMobile: mobile, status: "active", createdAt: firebase.database.ServerValue.TIMESTAMP
    }).then(() => {
        document.getElementById("loader").style.display="none";
        document.getElementById("newSchoolName").value = "";
        document.getElementById("newOwnerMobile").value = "";
    });
}

// 📡 LIVE SYNC FOR CARDS
db.ref("Schools").on("value",snap=>{
    let data=snap.val()||{};
    renderCards(data);
});

function renderCards(data) {
    let html="";
    for(let id in data){
        let s = data[id];
        let status = s.status || "active";
        html += `
            <div class="school-card" data-search="${id} ${s.schoolName}">
                <div class="card-top">
                    <span class="school-id-label">${id}</span>
                    <span class="status-badge ${status === 'active' ? 'active-bg' : 'blocked-bg'}">${status}</span>
                </div>
                <div class="card-body">
                    <span class="school-name-text">${s.schoolName}</span>
                    <div class="owner-info">
                        <i class="fas fa-phone-alt"></i> ${s.ownerMobile}
                    </div>
                </div>
                <div class="card-actions">
                    <a href="https://wa.me/91${s.ownerMobile}" class="action-icon btn-wa" target="_blank"><i class="fab fa-whatsapp"></i></a>
                    <button class="action-icon ${status==='active'?'btn-block':'btn-unblock'}" onclick="toggleStatus('${id}','${status}')">
                        <i class="fas ${status==='active'?'fa-lock':'fa-unlock'}"></i>
                    </button>
                    <button class="action-icon btn-del" onclick="delSchool('${id}')"><i class="fas fa-trash"></i></button>
                </div>
            </div>
        `;
    }
    document.getElementById("cardsList").innerHTML = html || '<p style="text-align:center; width:100%;">कोई स्कूल नहीं मिला।</p>';
}

function filterCards() {
    let val = document.getElementById("searchBar").value.toLowerCase();
    let cards = document.querySelectorAll('.school-card');
    cards.forEach(c => {
        let text = c.getAttribute('data-search').toLowerCase();
        c.style.display = text.includes(val) ? "block" : "none";
    });
}

function toggleStatus(id,status){
    let next = status==="active"?"blocked":"active";
    if(confirm(`${id} को ${next} करें?`)) db.ref(`Schools/${id}`).update({ status:next });
}
function delSchool(id){
    if(confirm(`ID ${id} हमेशा के लिए डिलीट करें?`)) db.ref(`Schools/${id}`).remove();
}

document.addEventListener('contextmenu', e => e.preventDefault());
</script>
</body>
</html>
