<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SchoolSphere Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --primary: #1a1c2c; --gold: #ffd700; --blue: #0072ff; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f7f6;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card {
            background: white;
            width: 90%;
            max-width: 400px;
            padding: 35px 25px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 5px solid var(--primary);
        }

        .login-card i.logo {
            font-size: 50px;
            color: var(--primary);
            margin-bottom: 15px;
        }

        h2 { color: var(--primary); margin-bottom: 25px; font-weight: 700; }

        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 14px;
            color: #888;
        }

        input, select {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border-radius: 12px;
            border: 2px solid #eee;
            box-sizing: border-box;
            outline: none;
            font-size: 15px;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: var(--blue);
            background: #fff;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            margin-top: 10px;
            border: none;
            background: var(--primary);
            color: var(--gold);
            font-size: 17px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .btn-login:active { transform: scale(0.98); }

        .footer-text {
            margin-top: 25px;
            font-size: 12px;
            color: #777;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <i class="fas fa-graduation-cap logo"></i>
        <h2>SchoolSphere Pro</h2>

        <div class="input-group">
            <i class="fas fa-user-shield"></i>
            <input type="number" id="ownerID" placeholder="Owner ID (ओनर मोबाइल)">
        </div>

        <div class="input-group">
            <i class="fas fa-school"></i>
            <input type="text" id="schoolID" placeholder="School ID (जैसे SS-101)">
        </div>

        <div class="input-group">
            <i class="fas fa-user-tag"></i>
            <select id="userRole">
                <option value="">अपना रोल चुनें</option>
                <option value="principal">Principal (प्रिंसिपल)</option>
                <option value="accountant">Accountant (एकाउंटेंट)</option>
                <option value="teacher">Teacher (शिक्षक)</option>
                <option value="parent">Parent (अभिभावक)</option>
                <option value="driver">Driver (ड्राइवर)</option>
            </select>
        </div>

        <div class="input-group">
            <i class="fas fa-mobile-alt"></i>
            <input type="number" id="userMobile" placeholder="आपका मोबाइल नंबर">
        </div>

        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="userPass" placeholder="पासवर्ड">
        </div>

        <button class="btn-login" onclick="handleLogin()">सुरक्षित लॉगिन करें ✅</button>

        <div class="footer-text">v2.5 • Smart School Management</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBSgfU5OhUmLGwc6OBxgrudtZpqMCzgQpw",
            authDomain: "schoolsphere-824ca.firebaseapp.com",
            projectId: "schoolsphere-824ca",
            databaseURL: "https://schoolsphere-824ca-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        async function handleLogin() {
            const oID = document.getElementById('ownerID').value.trim();
            const sID = document.getElementById('schoolID').value.trim();
            const role = document.getElementById('userRole').value;
            const mobile = document.getElementById('userMobile').value.trim();
            const pass = document.getElementById('userPass').value;

            if(!oID || !sID || !role || !mobile || !pass) {
                alert("❌ कृपया सभी बॉक्स भरें!");
                return;
            }

            // 🕵️‍♂️ स्टेप 1: पहले स्कूल चेक करें कि वह इसी ओनर की है या नहीं
            db.ref(`Schools/${sID}`).once('value', (snap) => {
                const school = snap.val();

                if (school && (school.ownerMobile == oID || school.ownerUID == oID)) {
                    
                    // स्टेप 2: अब सही फोल्डर (Principal, Teacher आदि) में लॉगिन चेक करें
                    // नोट: डेटाबेस में टीचर्स और स्टाफ को अलग-अलग नोड्स में रखा गया है
                    let path = `Schools/${sID}/Teachers/${mobile}`;
                    if(role === 'principal') path = `Schools/${sID}/Principals/${mobile}`;
                    if(role === 'parent') path = `Schools/${sID}/Parents/${mobile}`;
                    if(role === 'driver') path = `Schools/${sID}/Buses/${mobile}`;
                    if(role === 'accountant') path = `Schools/${sID}/Accountants/${mobile}`;

                    db.ref(path).once('value', (userSnap) => {
                        const user = userSnap.val();

                        if (user && user.password === pass) {
                            // ✅ लॉगिन सफल! अगले पेज के लिए डेटा सेव करें
                            localStorage.setItem("activeOwnerID", oID);
                            localStorage.setItem("activeSchoolID", sID);
                            localStorage.setItem("userMobile", mobile);
                            localStorage.setItem("userRole", role);

                            alert(`Welcome! ${role} डैशबोर्ड खुल रहा है...`);
                            
                            // सही फाइल पर भेजें
                            window.location.href = role + ".html"; 
                        } else {
                            alert("❌ गलत मोबाइल नंबर या पासवर्ड!");
                        }
                    });

                } else {
                    alert("❌ गलत Owner ID या School ID! डेटा नहीं मिला।");
                }
            });
        }
    </script>
</body>
</html>
