<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SchoolSphere - Welcome</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root { --gold:#ffd700; --error:#ff4d4d; --glass: rgba(255,255,255,0.1); --success:#2ecc71; }

body {
    margin:0; font-family:'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white; text-align:center; min-height:100vh;
    display:flex; flex-direction:column; justify-content:center;
    overflow: hidden;
}

.app-name { font-size:42px; font-weight:800; color:var(--gold); text-shadow:0 4px 10px rgba(0,0,0,0.5); margin:0; }
.tagline { font-size:12px; margin-bottom:20px; color:#aaa; letter-spacing: 1px; }

/* 🟢 Enhanced Input */
.id-container { margin-bottom: 15px; position: relative; display: inline-block; width: 100%; }
input {
    padding:14px; border-radius:30px; border:2px solid #555;
    width:85%; max-width:280px; text-align:center; font-size:18px;
    background: var(--glass); color:white; outline:none; transition: 0.3s;
}
input:focus { border-color: var(--gold); background: rgba(255,255,255,0.15); }
input.valid { border-color: var(--success); box-shadow: 0 0 15px rgba(46,204,113,0.4); }

/* 🟢 Role Grid */
.role-grid {
    display:grid; grid-template-columns: 1fr 1fr; gap:12px;
    width:92%; max-width:420px; margin:auto; padding: 5px;
}

.role {
    padding:20px 10px; border-radius:22px; cursor:pointer; font-weight:bold;
    transition:0.3s; box-shadow:0 8px 15px rgba(0,0,0,0.3);
    display: flex; flex-direction: column; align-items: center; gap: 8px; font-size: 14px;
    filter: grayscale(0.8); opacity: 0.6; pointer-events: none; /* ID के बिना डिसेबल */
}

/* जब ID सही हो तो बटन एक्टिव और कलरफुल हो जाएं */
.valid-id .role { filter: grayscale(0); opacity: 1; pointer-events: auto; }

.role i { font-size: 24px; }
.role:active { transform: scale(0.92); }

.owner { background:linear-gradient(45deg,#6a11cb,#2575fc); grid-column:span 2; }
.principal { background:linear-gradient(45deg,#2575fc,#4facfe); }
.accountant { background:linear-gradient(45deg,#f2994a,#f2c94c); }
.teacher { background:linear-gradient(45deg,#11998e,#38ef7d); }
.driver { background:linear-gradient(45deg,#f093fb,#f5576c); }
.parent { background:linear-gradient(45deg,#ff5f6d,#ffc371); grid-column:span 2; }

/* 🟢 Overlay Loader */
#loader {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.9); z-index:2000;
    flex-direction:column; align-items:center; justify-content:center;
}
#toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:#e74c3c; color:white; padding:10px 25px; border-radius:30px; display:none; font-weight:bold; z-index:3000; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
</style>
</head>

<body id="mainBody">

<div id="loader">
    <i class="fas fa-satellite-dish fa-spin" style="font-size:50px;color:var(--gold)"></i>
    <p style="color:var(--gold); margin-top:15px; font-weight:bold; letter-spacing: 1px;">ID Verifying...</p>
</div>

<div id="toast"></div>

<div class="app-name">SchoolSphere</div>
<div class="tagline">The Smart School Hub • v2.6</div>

<div class="id-container">
    <input type="text" id="mainSchoolID" placeholder="SCHOOL ID (जैसे SS-101)" maxlength="10"
    oninput="checkVal(this.value)">
</div>

<div class="role-grid">
    <div class="role owner" onclick="goTo('owner.html')"><i class="fas fa-crown"></i> Owner</div>
    <div class="role principal" onclick="goTo('principal.html')"><i class="fas fa-school"></i> Principal</div>
    <div class="role accountant" onclick="goTo('accountant_final.html')"><i class="fas fa-file-invoice-dollar"></i> Accountant</div>
    <div class="role teacher" onclick="goTo('teacher.html')"><i class="fas fa-chalkboard-teacher"></i> Teacher</div>
    <div class="role driver" onclick="goTo('driver.html')"><i class="fas fa-bus"></i> Driver</div>
    <div class="role parent" onclick="goTo('dashboard.html')"><i class="fas fa-user-graduate"></i> Parent / Student</div>
</div>

<script>
// 🔥 Firebase Setup (Correct API Key for your Project)
const firebaseConfig = { 
    apiKey: "AIzaSyBSgfU5OhUmLGwc6OBxgrudtZpqMCzgQpw", 
    databaseURL: "https://schoolsphere-824ca-default-rtdb.firebaseio.com/", 
    projectId: "schoolsphere-824ca" 
};
if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

let busy = false;

// 🟢 Real-time Validation UI
function checkVal(val) {
    let sID = val.replace(/[^A-Z0-9-]/g,'').toUpperCase();
    document.getElementById("mainSchoolID").value = sID;
    
    // अगर ID 3 अक्षर से ज्यादा है तो UI को 'Valid' दिखाएं
    if(sID.length >= 3) {
        document.getElementById("mainSchoolID").classList.add("valid");
        document.getElementById("mainBody").classList.add("valid-id");
    } else {
        document.getElementById("mainSchoolID").classList.remove("valid");
        document.getElementById("mainBody").classList.remove("valid-id");
    }
}

function showToast(msg) {
    const t = document.getElementById("toast");
    t.innerText = msg; t.style.display = "block";
    setTimeout(() => t.style.display = "none", 3000);
}

function vibrate() { if(navigator.vibrate) navigator.vibrate(100); }

// 🟢 Smart Session Check
async function goTo(page) {
    if(busy) return;
    let sID = document.getElementById("mainSchoolID").value.trim().toUpperCase();
    
    if(sID.length < 3) {
        showToast("❌ सही School ID डालें"); vibrate(); return;
    }

    busy = true;
    document.getElementById("loader").style.display = "flex";

    try {
        // चेक करें कि डेटाबेस में यह ID है या नहीं
        const snap = await db.ref(`Schools/${sID}`).once('value');

        if(snap.exists()){
            localStorage.setItem("activeSchoolID", sID);
            localStorage.setItem("schoolName", snap.val().schoolName || "SchoolSphere");

            // 🛡️ चेक करें कि क्या यूजर पहले से लॉग इन है?
            auth.onAuthStateChanged(user => {
                if(user) {
                    // अगर लॉग इन है तो सीधा पेज पर भेजें
                    window.location.href = page;
                } else {
                    // अगर लॉग इन नहीं है तो लॉगिन पेज पर भेजें
                    window.location.href = "login.html";
                }
            });
        } else {
            showToast("❌ यह ID रजिस्टर नहीं है"); vibrate();
        }
    } catch(e) {
        showToast("📡 नेटवर्क एरर! चेक करें");
    } finally {
        document.getElementById("loader").style.display = "none";
        busy = false;
    }
}

window.onload = () => {
    let savedID = localStorage.getItem("activeSchoolID");
    if(savedID) {
        document.getElementById("mainSchoolID").value = savedID;
        checkVal(savedID);
    }
};
</script>

</body>
</html>
