<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👑 Principal Master Control - SchoolSphere Pro</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root { --primary:#1a1c2c; --gold:#ffd700; --accent:#2ecc71; --danger:#e74c3c; --blue:#3498db; }
body { font-family:sans-serif; background:#f4f7f6; margin:0; padding-bottom:50px; }

/* 🏫 School Branding Header (Professional Look) */
.top { 
    background:var(--primary); color:#fff; padding:20px; text-align:center; 
    position:sticky; top:0; z-index:1000; box-shadow:0 4px 10px rgba(0,0,0,0.2); 
    border-bottom: 3px solid var(--gold);
}
.top h2 { margin: 0; font-size: 22px; }
.top small { display: block; margin-top: 5px; opacity: 0.9; font-weight: bold; letter-spacing: 1px; }

#masterLoader { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(26,28,44,0.9); z-index:10000; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--gold); }
.stats-bar { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:15px; }
.stat-card { background:#fff; padding:15px; border-radius:12px; text-align:center; box-shadow:0 4px 8px rgba(0,0,0,0.05); }
.stat-card h3 { margin:0; font-size:20px; color:var(--primary); }

.box { padding:15px; }
.row { background:#fff; padding:15px; margin:10px 0; border-radius:12px; box-shadow:0 2px 5px rgba(0,0,0,0.05); position:relative; border-left:5px solid var(--primary); }
input, select { padding:12px; margin:8px 0; width:100%; border-radius:10px; border:1px solid #ddd; outline:none; box-sizing:border-box; }
button { padding:8px 12px; margin:4px; border:none; border-radius:8px; cursor:pointer; font-weight:bold; transition:0.3s; font-size:13px; }
.btn-main { background:var(--primary); color:white; width:100%; font-size:16px; margin-top:10px; padding:12px; }
.btn-reset { background:#3498db; color:white; }
.btn-block { background:var(--danger); color:white; }
.btn-unblock { background:var(--accent); color:white; }
.btn-del { background:#555; color:white; }
.btn-wa { background:#25d366; color:white; } /* WhatsApp Share */

#toast { position: fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--danger); color:white; padding:10px 20px; border-radius:30px; display:none; z-index:10001; }

/* 📋 Success Modal */
#successModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:11000; align-items:center; justify-content:center; padding:20px; }
.modal-content { background:white; padding:25px; border-radius:20px; width:100%; max-width:350px; text-align:center; }
</style>
</head>

<body>
<div id="masterLoader">
    <i class="fas fa-crown fa-spin" style="font-size:40px; margin-bottom:15px;"></i>
    <b id="loaderText">डेटा क्लाउड से सिंक हो रहा है...</b>
</div>

<div id="toast"></div>

<div id="successModal">
    <div class="modal-content">
        <h3 style="color:var(--accent);">✅ यूजर जुड़ गया!</h3>
        <div id="infoBox" style="background:#f9f9f9; padding:15px; border-radius:10px; text-align:left; font-family:monospace; margin-bottom:15px; border:1px dashed #ccc;"></div>
        <button id="waBtn" class="btn-wa" style="width:100%; padding:12px;"><i class="fab fa-whatsapp"></i> WhatsApp पर भेजें</button>
        <button onclick="document.getElementById('successModal').style.display='none'" style="background:#eee; border:none; padding:10px; width:100%; margin-top:10px; border-radius:10px;">बंद करें</button>
    </div>
</div>

<div class="top">
    <h2 id="displaySchoolName">Principal Panel</h2>
    <small id="appBranding">by SchoolSphere Pro</small>
    <div style="font-size: 11px; margin-top: 5px; color: var(--gold);">School ID: <b id="displaySID">--</b></div>
</div>

<div class="stats-bar">
    <div class="stat-card"><h3>₹ <span id="totalFees">0</span></h3><p>Paid Fees</p></div>
    <div class="stat-card"><h3><span id="userCount">0</span></h3><p>Total Users</p></div>
</div>

<div class="box">
    <h3>➕ Add New User</h3>
    <input id="name" placeholder="नाम दर्ज करें">
    <input id="mobile" type="number" placeholder="Mobile">
    
    <select id="role">
        <option value="Students">Student</option>
        <option value="Parents">Parent</option>
        <option value="Teachers">Teacher</option>
        <option value="Buses">Driver (Bus)</option>
        <option value="Accountants">Accountant (एकाउंटेंट)</option> </select>
    <button class="btn-main" onclick="createUser()">Create User & Generate Pass ✅</button>

    <hr style="margin:25px 0;">

    <h3>🔍 Search Records</h3>
    <input id="search" onkeyup="searchUser()" placeholder="नाम, रोल या मोबाइल से खोजें...">

    <div id="list"></div>
</div>

<script>
// ===== Firebase Config =====
const firebaseConfig = {
    apiKey: "AIzaSyBSgfU5OhUmLGwc6OBxgrudtZpqMCzgQpw",
    authDomain: "schoolsphere-824ca.firebaseapp.com",
    databaseURL: "https://schoolsphere-824ca-default-rtdb.firebaseio.com/",
    projectId: "schoolsphere-824ca"
};

if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let activeSID = ""; 
let masterData = {}, loaded=false;

// 🔐 Secure Mixed Password Generator
function generateSecurePass() {
    const chars = "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789";
    let pass = "";
    for (let i = 0; i < 8; i++) pass += chars.charAt(Math.floor(Math.random() * chars.length));
    return pass;
}

// 📡 Sahi Login Check: Ab Loading pe nahi atkega
auth.onAuthStateChanged(user => {
    if(user) {
        // UID se School ID dhoondhna
        db.ref("users/" + user.uid).once("value", snap => {
            const uData = snap.val();
            if(uData && uData.schoolID) {
                activeSID = uData.schoolID;
                document.getElementById("displaySID").innerText = activeSID;
                updateBranding();
                safeLoad();
            } else {
                // Agar users folder me na mile to Managers me check karega
                db.ref("Managers/" + user.uid).once("value", mSnap => {
                    if(mSnap.exists()){
                        activeSID = mSnap.val().schoolID;
                        document.getElementById("displaySID").innerText = activeSID;
                        updateBranding();
                        safeLoad();
                    } else {
                        document.getElementById("loaderText").innerHTML = "❌ स्कूल आईडी नहीं मिली! ओनर से संपर्क करें।";
                    }
                });
            }
        });
    } else {
        window.location.href = "login.html";
    }
});

function updateBranding() {
    db.ref(`Schools/${activeSID}/schoolName`).on('value', snap => {
        document.getElementById("displaySchoolName").innerText = snap.val() || "Principal Panel";
    });
}

// ===== CREATE USER =====
async function createUser(){
    let name = document.getElementById("name").value.trim();
    let mobile = document.getElementById("mobile").value.trim();
    let role = document.getElementById("role").value;
    if(!name || mobile.length !== 10){ alert("सही विवरण भरें ❌"); return; }

    let exists = masterData[role] && masterData[role][mobile];
    if(exists){ alert("यह ID पहले से मौजूद है ❌"); return; }

    let rawPass = generateSecurePass();

    let dataObj = { name, mobile, role, password: rawPass, status:"active", createdAt:Date.now() };
    if(role==="Buses") dataObj.liveLocation = {lat:0,lng:0};

    db.ref(`Schools/${activeSID}/${role}/${mobile}`).set(dataObj).then(()=>{
        showSuccessModal(name, mobile, role, rawPass);
        document.getElementById("name").value="";
        document.getElementById("mobile").value="";
    });
}

function showSuccessModal(name, id, role, pass) {
    const modal = document.getElementById("successModal");
    const info = document.getElementById("infoBox");
    const wa = document.getElementById("waBtn");
    const text = `📌 *School Login Details*\n👤 Name: ${name}\n🎭 Role: ${role}\n📱 ID: ${id}\n🔑 Pass: ${pass}`;
    
    info.innerHTML = `<b>Name:</b> ${name}<br><b>ID:</b> ${id}<br><b>Pass:</b> <span style="color:red">${pass}</span>`;
    wa.onclick = () => window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
    modal.style.display = "flex";
}

// ===== LOAD DATA =====
function safeLoad(){
    db.ref(`Schools/${activeSID}`).on("value", snap=>{
        masterData = snap.val() || {};
        calculateStats();
        renderAll();
        if(!loaded){ document.getElementById("masterLoader").style.display="none"; loaded=true; }
    }, err=>{ showToast("Network Error ❌"); });
}

function calculateStats(){
    let totalPaid=0, count=0;
    ["Students","Parents","Teachers","Buses","Accountants"].forEach(node => {
        let data = masterData[node] || {};
        Object.values(data).forEach(u => {
            count++;
            if(node === "Students") totalPaid += Number(u.paid || 0);
        });
    });
    document.getElementById("totalFees").innerText = totalPaid.toLocaleString('hi-IN');
    document.getElementById("userCount").innerText = count;
}

function renderAll(){
    let html="";
    ["Students","Parents","Teachers","Buses","Accountants"].forEach(node=>{
        let data = masterData[node] || {};
        Object.keys(data).forEach(id=>{
            let u=data[id];
            let blocked = u.status==="blocked";
            html+=`<div class="row" style="border-left-color:${blocked?'red':'#2ecc71'}">
                <b>${u.name}</b> <small>(${node})</small><br>
                <small>ID: ${id} | Pass: <span style="color:blue">${u.password}</span></small><br>
                <div style="margin-top:10px;">
                    <button class="btn-wa" onclick="showSuccessModal('${u.name}','${id}','${node}','${u.password}')"><i class="fab fa-whatsapp"></i></button>
                    <button class="btn-reset" onclick="resetLogin('${node}','${id}')">Reset</button>
                    <button class="${blocked?'btn-unblock':'btn-block'}" onclick="toggleStatus('${node}','${id}','${u.status}')">${blocked?'Unblock':'Block'}</button>
                    <button class="btn-del" onclick="delUser('${node}','${id}')">Delete</button>
                </div>
            </div>`;
        });
    });
    document.getElementById("list").innerHTML = html || "<p style='text-align:center'>कोई रिकॉर्ड नहीं मिला</p>";
}

function searchUser(){
    let val=document.getElementById("search").value.toLowerCase();
    document.querySelectorAll(".row").forEach(r=>{
        r.style.display = r.innerText.toLowerCase().includes(val) ? "" : "none";
    });
}

async function resetLogin(node,id){
    let rawPass = generateSecurePass();
    db.ref(`Schools/${activeSID}/${node}/${id}`).update({ password:rawPass });
    alert("नया पासवर्ड: "+rawPass);
}

function toggleStatus(node,id,current){
    let next = current === "blocked" ? "active" : "blocked";
    db.ref(`Schools/${activeSID}/${node}/${id}`).update({ status:next });
}

function delUser(node,id){
    if(confirm("हमेशा के लिए डिलीट करें?")) db.ref(`Schools/${activeSID}/${node}/${id}`).remove();
}

function showToast(msg){ let t=document.getElementById("toast"); t.innerText=msg; t.style.display="block"; setTimeout(()=>t.style.display="none",3000); }
</script>
</body>
</html>
