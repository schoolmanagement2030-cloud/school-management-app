<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchoolSphere Pro - Dashboard</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --primary: #1a1c2c; --gold: #ffd700; --bg: #f4f7f6; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); user-select: none; }

        #loader {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 28, 44, 0.95); color: var(--gold);
            z-index: 9999; flex-direction: column; align-items: center; justify-content: center;
        }

        .top-nav {
            background: var(--primary); color: white; padding: 20px;
            border-radius: 0 0 25px 25px; text-align: center; position: sticky; top: 0; z-index: 1000;
        }

        /* 🏫 Branding Styles (New Plus) */
        .branding-text { font-size: 20px; font-weight: 700; color: white; margin-bottom: 10px; display: block; }
        .branding-sub { font-size: 11px; opacity: 0.7; font-weight: bold; letter-spacing: 1px; display: block; margin-bottom: 15px; }

        .student-picker {
            display: flex; overflow-x: auto; gap: 15px; justify-content: center; padding: 10px;
            scrollbar-width: none;
        }
        .student-picker::-webkit-scrollbar { display: none; }

        .student-thumb {
            width: 65px; height: 65px; border-radius: 50%;
            cursor: pointer; border: 3px solid transparent; transition: 0.3s; object-fit: cover;
            background: #333;
        }
        .active { border-color: var(--gold); transform: scale(1.1); box-shadow: 0 0 10px var(--gold); }

        .grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 15px; padding: 20px;
        }

        .card {
            background: white; padding: 20px 5px; text-align: center;
            border-radius: 20px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: 0.2s;
        }
        .card:active { transform: scale(0.95); background: #eee; }
        .card i { display: block; font-size: 24px; margin-bottom: 8px; }
        .card span { font-size: 11px; font-weight: bold; color: #444; }

        .bus-float {
            position: fixed; bottom: 25px; right: 25px; background: var(--gold);
            width: 60px; height: 60px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-size: 24px;
            color: var(--primary); box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 999;
        }
    </style>
</head>

<body>

<div id="loader">
    <i class="fas fa-circle-notch fa-spin" style="font-size: 40px; margin-bottom: 15px;"></i>
    <span>डेटा सिंक हो रहा है...</span>
</div>

<div class="top-nav">
    <span id="displaySchoolName" class="branding-text">SchoolSphere Pro</span>
    <span class="branding-sub">by SchoolSphere Pro</span>
    
    <div id="picker" class="student-picker"></div>
    <h2 id="name" style="margin: 10px 0 0; color: var(--gold);">Loading...</h2>
    <p id="class" style="margin: 0; opacity: 0.8; font-size: 14px;">Student Dashboard</p>
</div>

<div class="grid">
    <div class="card" onclick="go('attendance')"><i class="fas fa-calendar-check" style="color:#2ecc71;"></i><span>Attendance</span></div>
    <div class="card" onclick="go('homework')"><i class="fas fa-book" style="color:#3498db;"></i><span>Homework</span></div>
    <div class="card" onclick="go('fees')"><i class="fas fa-receipt" style="color:#f39c12;"></i><span>Fees</span></div>
    <div class="card" onclick="go('notices')"><i class="fas fa-bullhorn" style="color:#e74c3c;"></i><span>Notices</span></div>
    <div class="card" onclick="go('timetable')"><i class="fas fa-clock" style="color:#9b59b6;"></i><span>TimeTable</span></div>
    <div class="card" onclick="go('leave')"><i class="fas fa-paper-plane" style="color:#1abc9c;"></i><span>Leave</span></div>
    <div class="card" onclick="logout()"><i class="fas fa-power-off"></i><span>Logout</span></div>
</div>

<div class="bus-float" onclick="go('tracking')"><i class="fas fa-bus"></i></div>

<script>
// 🔴 VERSION RESET
const VERSION = "2.2"; 
if(localStorage.getItem("v") !== VERSION){
    localStorage.clear();
    localStorage.setItem("v", VERSION);
}

// 🔴 LOGIN CHECK
const sID = localStorage.getItem("activeSchoolID");
const mobile = localStorage.getItem("parentMobile");

if(!sID || !mobile){
    location.href = "login.html";
}

// 🔴 FIREBASE
const firebaseConfig = {
    apiKey: "AIzaSyBSgfU5OhUmLGwc6OBxgrudtZpqMCzgQpw", 
    databaseURL: "https://schoolsphere-824ca-default-rtdb.firebaseio.com/",
    projectId: "schoolsphere-824ca"
};
if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
const db = firebase.database();

let students = [], current = 0, refs = [];

// 🏫 NEW: Fetch School Name for Branding
function updateBranding() {
    db.ref(`Schools/${sID}/schoolName`).on('value', snap => {
        const sName = snap.val() || "SchoolSphere Pro";
        document.getElementById("displaySchoolName").innerText = sName;
    });
}

// 🔴 LOAD STUDENTS
async function load() {
    updateBranding(); // Branding call
    if(!navigator.onLine){ 
        document.getElementById("name").innerText = "ऑफलाइन मोड";
        return; 
    }

    showLoader();
    try {
        let snap = await db.ref(`Schools/${sID}/Parents/${mobile}/students`).once('value');
        let list = snap.val();

        if(!list || !Array.isArray(list)){
            document.getElementById("name").innerText = "डेटा नहीं मिला";
            hideLoader(); return;
        }

        let data = await Promise.all(
            list.map(id => db.ref(`Schools/${sID}/Students/${id}`).once('value'))
        );

        students = data.map((s, i) => {
            let v = s.val();
            if(v){ v.id = list[i]; return v; }
        }).filter(Boolean);

        if(students.length > 0) {
            render();
            show(0);
        }
    } catch(e) {
        setTimeout(load, 5000);
    }
    hideLoader();
}

function render(){
    let html = "";
    students.forEach((s, i) => {
        html += `<img src="${s.photo || 'https://via.placeholder.com/100?text=User'}" 
                 onerror="this.src='https://via.placeholder.com/100?text=User'"
                 class="student-thumb ${i == 0 ? 'active' : ''}" 
                 onclick="show(${i})" id="t${i}">`;
    });
    document.getElementById("picker").innerHTML = html;
}

function show(i) {
    current = i;
    let s = students[i];
    document.getElementById("name").innerText = s.name || "Student";
    document.getElementById("class").innerText = `कक्षा: ${s.class || '--'} | रोल नंबर: ${s.rollNo || '--'}`;
    document.querySelectorAll(".student-thumb").forEach(x => x.classList.remove("active"));
    document.getElementById("t" + i).classList.add("active");

    localStorage.setItem("studentID", s.id);
    sync(s.id);
}

// 🔴 SILENT SYNC
function sync(id) {
    refs.forEach(r => r.off());
    refs = [];

    let cls = students[current].class || "default";

    let paths = [
        {key: "att", path: `Attendance/${id}`},
        {key: "hw", path: `Homework/${cls}`},
        {key: "fees", path: `Fees/${id}`},
        {key: "notice", path: `Notices/${cls}`}
    ];

    paths.forEach(p => {
        let r = db.ref(`Schools/${sID}/${p.path}`);
        r.on("value", snap => {
            const data = JSON.stringify(snap.val() || {});
            localStorage.setItem(p.key, data.slice(0, 40000)); 
        });
        refs.push(r);
    });
}

function go(p) {
    if(!students[current]) return;
    showLoader();
    setTimeout(() => location.href = p + ".html", 150);
}

function logout() {
    if(confirm("Logout करना चाहते हैं?")){
        refs.forEach(r => r.off());
        localStorage.clear();
        location.href = "login.html";
    }
}

function showLoader() { document.getElementById("loader").style.display = "flex"; }
function hideLoader() { document.getElementById("loader").style.display = "none"; }

window.addEventListener("online", load);
window.onload = load;

</script>

</body>
</html>
