<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>Teacher Dashboard - SchoolSphere</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body { font-family:'Segoe UI'; background:#f0f2f5; margin:0; padding:15px; }

.header {
background:#1a1c2c;
color:#ffd700;
padding:20px;
border-radius:15px;
text-align:center;
margin-bottom:20px;
position:relative;
}

.logout-btn{
position:absolute;
right:15px;
top:15px;
background:#e74c3c;
color:white;
border:none;
padding:6px 12px;
border-radius:8px;
cursor:pointer;
}

.grid {
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.menu-card {
background:white;
padding:25px 10px;
border-radius:20px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
cursor:pointer;
transition:0.2s;
}

.menu-card:hover { transform:scale(1.05); }

.menu-card i {
font-size:30px;
color:#2ecc71;
margin-bottom:10px;
display:block;
}

.menu-card span {
font-weight:bold;
color:#2c3e50;
}

/* Emergency Button */
.emergency-btn {
grid-column:span 2;
background:#fff5f5;
border:2px dashed #e74c3c;
}

.emergency-btn i { color:#e74c3c; }

.footer{
margin-top:20px;
text-align:center;
font-size:12px;
color:#777;
}
</style>
</head>

<body>

<div class="header">
<button class="logout-btn" onclick="logout()">Logout</button>
<h2 style="margin:0">SchoolSphere Teacher</h2>
<small id="teacherName">Loading...</small>
</div>

<div class="grid">

<div class="menu-card" onclick="go('attendance.html')">
<i class="fas fa-user-check"></i>
<span>Take Attendance</span>
</div>

<div class="menu-card" onclick="go('homework.html')">
<i class="fas fa-book-open"></i>
<span>Upload Homework</span>
</div>

<div class="menu-card" onclick="go('marks.html')">
<i class="fas fa-chart-line"></i>
<span>Enter Marks</span>
</div>

<div class="menu-card" onclick="go('notices.html')">
<i class="fas fa-bullhorn"></i>
<span>General Notice</span>
</div>

<div class="menu-card emergency-btn" onclick="sendEarlyLeaveAlert()">
<i class="fas fa-running"></i>
<span>Student Leaving Early?<br><small>(Alert Bus Driver)</small></span>
</div>

</div>

<div class="footer">SchoolSphere ERP v20 🚀</div>

<script>

// 🔥 Firebase Config
const firebaseConfig = {
apiKey: "AIzaSy...",
databaseURL: "https://schoolsphere-824ca-default-rtdb.firebaseio.com/",
projectId: "schoolsphere-824ca"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 📦 Load Teacher Info
const schoolID = localStorage.getItem("activeSchoolID");
const mobile = localStorage.getItem("teacherMobile");

// अगर लॉगिन नहीं है
if(!schoolID || !mobile){
alert("पहले लॉगिन करें!");
window.location.href="teacher-login.html";
}

// 👨‍🏫 Teacher Name Load
db.ref(`Schools/${schoolID}/Teachers/${mobile}`).once("value")
.then(snap=>{
if(snap.exists()){
document.getElementById("teacherName").innerText =
"Welcome, " + (snap.val().name || "Teacher");
}
});

// 🔗 Page Navigation
function go(page){
window.location.href = page;
}

// 🚨 Emergency Alert (REAL FIREBASE)
async function sendEarlyLeaveAlert(){

let studentName = prompt("बच्चे का नाम लिखें:");
let reason = prompt("जाने का कारण:");

if(!studentName || !reason){
alert("पूरा विवरण भरें!");
return;
}

try{
await db.ref(`Schools/${schoolID}/Alerts/Driver`).push({
student: studentName,
reason: reason,
msg: `${studentName} आज जल्दी घर गया (${reason})`,
time: Date.now()
});

alert("Bus Driver को Alert भेज दिया गया! ✅");

}catch(e){
alert("Error: "+e.message);
}
}

// 🚪 Logout
function logout(){
localStorage.clear();
window.location.href = "teacher-login.html";
}

</script>

</body>
</html>
