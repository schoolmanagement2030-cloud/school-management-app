<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>School Owner - SchoolSphere Pro</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --owner-primary: #2c3e50; --gold: #f1c40f; --accent: #34495e; }
        body { margin:0; font-family: 'Poppins', sans-serif; background: #f0f2f5; color: #2c3e50; }

        /* Header Style */
        .owner-header {
            background: var(--owner-primary);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--gold);
        }
        .owner-header h1 { font-size: 20px; margin: 0; }

        .container { padding: 15px; max-width: 500px; margin: auto; }

        /* Quick Stats Card */
        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 15px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .stat-card i { font-size: 24px; color: var(--gold); margin-bottom: 5px; }
        .stat-card b { display: block; font-size: 18px; }

        /* Action Cards */
        .card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        .card h3 { margin: 0 0 15px 0; font-size: 18px; display: flex; align-items: center; gap: 10px; color: var(--owner-primary); }

        input { width: 100%; padding: 12px; margin: 8px 0; border: 1.5px solid #eee; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-hire { background: var(--owner-primary); color: white; }
        .btn-notice { background: var(--gold); color: black; }

        /* Principal List */
        .p-item {
            background: white;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid var(--gold);
        }
        .p-info b { font-size: 16px; display: block; }
        .p-info span { font-size: 13px; color: #777; }
    </style>
</head>

<body>

<div class="owner-header">
    <h1><i class="fas fa-user-tie"></i> School Owner</h1>
    <button onclick="logout()" style="background:none; border:none; color:white; font-size: 20px;"><i class="fas fa-power-off"></i></button>
</div>

<div class="container">

    <div class="stats-row">
        <div class="stat-card"><i class="fas fa-university"></i> <b>1</b> <span>स्कूल</span></div>
        <div class="stat-card"><i class="fas fa-users"></i> <b id="pCount">0</b> <span>प्रिंसिपल</span></div>
    </div>

    <div class="card">
        <h3><i class="fas fa-user-plus"></i> प्रिंसिपल नियुक्त करें</h3>
        <input type="text" id="pName" placeholder="प्रिंसिपल का नाम">
        <input type="number" id="pPhone" placeholder="प्रिंसिपल का मोबाइल नंबर">
        <button class="btn btn-hire" onclick="hirePrincipal()">Hire & Create Access</button>
    </div>

    <div class="card">
        <h3><i class="fas fa-envelope-open-text"></i> स्कूल के लिए नोटिस</h3>
        <input type="text" id="schoolNotice" placeholder="सभी स्टाफ को मैसेज भेजें...">
        <button class="btn btn-notice" onclick="sendSchoolNotice()">Push Notice</button>
    </div>

    <h3 style="padding-left: 10px;">मेरी मैनेजमेंट टीम</h3>
    <div id="pList">
        </div>

</div>

<script>
// Firebase Config
const firebaseConfig = {
    apiKey: "AIzaSyBSgfU5OhUmLGwc6OBxgrudtZpqMCzgQpw",
    authDomain: "schoolsphere-824ca.firebaseapp.com",
    projectId: "schoolsphere-824ca",
    databaseURL: "https://schoolsphere-824ca-default-rtdb.firebaseio.com/",
    storageBucket: "schoolsphere-824ca.firebasestorage.app",
    appId: "1:698409232180:android:7b25559d225a001d9f6761"
};

if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
const db = firebase.database();

// Hire Principal
function hirePrincipal() {
    const name = document.getElementById('pName').value;
    const phone = document.getElementById('pPhone').value;

    if(!name || !phone) return alert("नाम और नंबर ज़रूरी है!");

    db.ref('principals/' + phone).set({
        name: name,
        phone: phone,
        status: 'Active',
        role: 'principal',
        hiredBy: 'SchoolOwner_1' // यहाँ स्कूल की ID आएगी
    }).then(() => {
        alert("प्रिंसिपल नियुक्त कर दिया गया है!");
        document.getElementById('pName').value = "";
        document.getElementById('pPhone').value = "";
    });
}

// Load List
db.ref('principals').on('value', snap => {
    const list = document.getElementById('pList');
    const count = document.getElementById('pCount');
    list.innerHTML = "";
    let i = 0;
    snap.forEach(child => {
        const p = child.val();
        i++;
        list.innerHTML += `
            <div class="p-item">
                <div class="p-info">
                    <b>${p.name}</b>
                    <span>Mobile: ${p.phone}</span>
                </div>
                <div style="color:green; font-weight:bold;">● Live</div>
            </div>
        `;
    });
    count.innerText = i;
});

function sendSchoolNotice() {
    const msg = document.getElementById('schoolNotice').value;
    if(!msg) return;
    db.ref('school_notices').push({ msg: msg, date: Date.now() }).then(() => {
        alert("स्कूल नोटिस जारी कर दिया गया!");
        document.getElementById('schoolNotice').value = "";
    });
}

function logout() { localStorage.clear(); window.location.href="../index.html"; }
</script>

</body>
</html>
