<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Owner - SchoolSphere Pro</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
    :root { --owner-primary: #2c3e50; --gold: #f1c40f; }
    body { margin:0; font-family: 'Poppins', sans-serif; background: #f0f2f5; color: #2c3e50; }
    .hidden { display:none; }

    /* Login & Register Form */
    #authContainer { max-width:400px; margin:80px auto; background:white; padding:30px; border-radius:15px; box-shadow:0 5px 20px rgba(0,0,0,0.1); text-align:center; }
    #authContainer h2 { margin-bottom:20px; color: var(--owner-primary); }
    input { width:100%; padding:12px; margin:10px 0; border-radius:10px; border:1px solid #ddd; font-size:16px; }
    .btn { width:100%; padding:15px; border:none; border-radius:12px; font-size:16px; margin-top:10px; cursor:pointer; font-weight:bold; }
    .btn-login { background: var(--owner-primary); color:white; }
    .btn-register { background: var(--gold); color:black; margin-top:5px; }
    .link { cursor:pointer; color: var(--owner-primary); text-decoration:underline; font-size:14px; }
</style>
</head>
<body>

<!-- AUTH (Login / Register) -->
<div id="authContainer">
    <h2 id="authTitle">Owner Login</h2>
    <input type="email" id="ownerEmail" placeholder="ईमेल" required>
    <input type="password" id="ownerPassword" placeholder="पासवर्ड" required>
    <button id="authBtn" class="btn btn-login">Login</button>
    <p id="switchAuth" class="link">Create new account</p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">
<div class="owner-header">
    <h1><i class="fas fa-user-tie"></i> School Owner</h1>
    <button onclick="logout()" style="background:none; border:none; color:white; font-size:20px;"><i class="fas fa-power-off"></i></button>
</div>

<div class="container">

    <div class="stats-row">
        <div class="stat-card"><i class="fas fa-university"></i> <b id="schoolCount">0</b> <span>स्कूल</span></div>
        <div class="stat-card"><i class="fas fa-users"></i> <b id="pCount">0</b> <span>प्रिंसिपल</span></div>
        <div class="stat-card"><i class="fas fa-bus"></i> <b id="busStatus">● Offline</b> <span>बस लोकेशन</span></div>
    </div>

    <div class="card">
        <h3><i class="fas fa-school"></i> स्कूल रजिस्टर करें</h3>
        <button class="btn btn-login" onclick="registerSchool()">स्कूल रजिस्टर करें</button>
    </div>

    <div class="card">
        <h3><i class="fas fa-user-plus"></i> प्रिंसिपल नियुक्त करें</h3>
        <select id="schoolSelect"></select>
        <input type="text" id="pName" placeholder="प्रिंसिपल का नाम">
        <input type="number" id="pPhone" placeholder="प्रिंसिपल का मोबाइल नंबर">
        <button class="btn btn-login" onclick="hirePrincipal()">Hire & Create Access</button>
    </div>

    <div class="card">
        <h3><i class="fas fa-key"></i> प्रिंसिपल पासवर्ड रीसेट करें</h3>
        <button class="btn btn-login" onclick="resetPrincipalPassword()">Reset Password</button>
    </div>

    <div class="card">
        <h3><i class="fas fa-envelope-open-text"></i> स्कूल नोटिस भेजें</h3>
        <input type="text" id="schoolNotice" placeholder="सभी स्टाफ को मैसेज भेजें...">
        <button class="btn btn-register" onclick="sendSchoolNotice()">Push Notice</button>
    </div>

    <h3 style="padding-left:10px;">मेरी प्रिंसिपल टीम</h3>
    <div id="pList"></div>

</div>
</div>

<script>
// Firebase Config
const firebaseConfig = {
    apiKey: "AIzaSyBSgfU5OhUmLGwc6OBxgrudtZpqMCzgQpw",
    authDomain: "schoolsphere-824ca.firebaseapp.com",
    projectId: "schoolsphere-824ca",
    databaseURL: "https://schoolsphere-824ca-default-rtdb.firebaseio.com/",
    storageBucket: "schoolsphere-824ca.firebasestorage.app",
    appId: "1:698409232180:android:7b25559d225a001d9f6761"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// Toggle Login / Register
let isLogin = true;
const authTitle = document.getElementById("authTitle");
const authBtn = document.getElementById("authBtn");
const switchAuth = document.getElementById("switchAuth");
switchAuth.addEventListener("click", ()=>{
    isLogin = !isLogin;
    authTitle.innerText = isLogin ? "Owner Login" : "Owner Registration";
    authBtn.innerText = isLogin ? "Login" : "Register";
    switchAuth.innerText = isLogin ? "Create new account" : "Already have account? Login";
});

// AUTH Button Click
authBtn.addEventListener("click", ()=>{
    const email = document.getElementById("ownerEmail").value;
    const password = document.getElementById("ownerPassword").value;
    if(!email || !password){ alert("सभी फील्ड्स भरें!"); return; }

    if(isLogin){
        auth.signInWithEmailAndPassword(email,password)
        .then(()=>{ showDashboard(); })
        .catch(err=>{ alert("Login Failed: "+err.message); });
    } else {
        auth.createUserWithEmailAndPassword(email,password)
        .then(()=>{ showDashboard(); })
        .catch(err=>{ alert("Registration Failed: "+err.message); });
    }
});

// Show Dashboard
function showDashboard(){
    document.getElementById("authContainer").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
    loadAnalytics();
    loadSchoolsDropdown();
    loadPrincipals();
    listenBusLocation();
}

// Logout
function logout(){
    auth.signOut().then(()=>{ location.reload(); });
}

// 🔐 Password Generate
function generatePassword(){ return Math.floor(100000 + Math.random()*900000).toString(); }

// 🏫 Register School
function registerSchool(){
    const name = prompt("स्कूल का नाम डालें:");
    if(!name) return;
    const id = "SCH_"+Date.now();
    db.ref("schools/"+id).set({ name, createdAt:Date.now(), status:"active" });
    alert("✅ स्कूल जोड़ दिया गया!");
}

// 📥 Load Schools Dropdown
function loadSchoolsDropdown(){
    const select = document.getElementById("schoolSelect");
    if(!select) return;
    db.ref("schools").on("value", snap=>{
        select.innerHTML = `<option value="">स्कूल चुनें</option>`;
        snap.forEach(child=> select.innerHTML += `<option value="${child.key}">${child.val().name}</option>`);
    });
}

// 👨‍💼 Hire Principal
async function hirePrincipal(){
    const name = document.getElementById("pName").value;
    const phone = document.getElementById("pPhone").value;
    const schoolID = document.getElementById("schoolSelect").value;
    if(!name||!phone||!schoolID){ alert("सभी विवरण भरें!"); return; }
    const password = generatePassword();
    const email = phone+"@schoolsphere.com";

    try{
        const res = await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${firebaseConfig.apiKey}`, {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({ email, password })
        });
        const data = await res.json();
        if(data.localId){
            db.ref("users/"+data.localId).set({ name, phone, role:"principal", schoolID, status:"active" });
            db.ref("principals/"+schoolID+"/"+phone).set({ name, phone });
            alert(`✅ Principal Created!\n📱 ${phone}\n🔑 Password: ${password}`);
            document.getElementById('pName').value="";
            document.getElementById('pPhone').value="";
            loadPrincipals();
        }
    } catch(e){ alert("Error creating principal!"); }
}

// 🔐 Reset Password
async function resetPrincipalPassword(){
    const phone = prompt("Principal का मोबाइल नंबर डालें:");
    if(!phone) return;
    const newPassword = generatePassword();
    const email = phone+"@schoolsphere.com";
    try{
        await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${firebaseConfig.apiKey}`, {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({ email, password:newPassword })
        });
        alert(`🔑 नया पासवर्ड:\n📱 ${phone}\nPassword: ${newPassword}`);
    }catch(e){ alert("Reset failed!"); }
}

// 📢 Send Notice
function sendSchoolNotice(){
    const msg = document.getElementById("schoolNotice").value;
    if(!msg) return;
    db.ref("notices").push({ msg, time: Date.now() });
    alert("Notice भेज दिया गया!");
    document.getElementById("schoolNotice").value="";
}

// 📊 Analytics Load
function loadAnalytics(){
    db.ref("schools").once("value", s=>{ document.getElementById("schoolCount").innerText=s.numChildren(); });
    db.ref("principals").once("value", p=>{
        let count=0;
        p.forEach(s=> count+=s.numChildren());
        document.getElementById("pCount").innerText = count;
    });
}

// Load Principals List
function loadPrincipals(){
    const list = document.getElementById("pList");
    db.ref("principals").on("value", snap=>{
        list.innerHTML="";
        snap.forEach(school=> school.forEach(p=>{
            list.innerHTML += `<div class="p-item">
                <div class="p-info"><b>${p.val().name}</b><span>Mobile: ${p.val().phone}</span></div>
                <div style="color:green; font-weight:bold;">● Live</div>
            </div>`;
        }));
    });
}

// Live Bus
function listenBusLocation(){
    db.ref("bus_location").on("value", snap=>{
        const d = snap.val();
        if(d) document.getElementById("busStatus").innerText=`📍 Lat: ${d.lat}, Lng: ${d.lng}`;
    });
}

// Auto login check
auth.onAuthStateChanged(user=>{ if(user) showDashboard(); });
</script>
</body>
</html>
