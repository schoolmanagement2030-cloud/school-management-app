<!DOCTYPE html>
<html>

<head>

<title>Teacher Panel</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#eef2f3,#dfe9f3);
text-align:center;
margin:0;
}

.title{
font-size:30px;
margin-top:20px;
color:#2c5364;
}

button{
display:block;
width:240px;
margin:12px auto;
padding:14px;
font-size:16px;
cursor:pointer;
border:none;
border-radius:25px;
background:linear-gradient(45deg,#4CAF50,#2ecc71);
color:white;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

button:hover{
opacity:0.9;
}

</style>

</head>

<body>

<h1 class="title">Teacher Panel</h1>

<button onclick="markAttendance()">Mark Attendance</button>

<button onclick="viewStudents()">View Students</button>

<button onclick="sendMessage()">Send Message</button>

<button onclick="logout()">Logout</button>

<p id="status"></p>

<script>

function markAttendance(){
document.getElementById("status").innerText="Attendance marked successfully";
}

function viewStudents(){
alert("Student list coming soon");
}

function sendMessage(){
alert("Message feature coming soon");
}

function logout(){
window.location.href="login.html";
}

</script>

</body>

</html>
