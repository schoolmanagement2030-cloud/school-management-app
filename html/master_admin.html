<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Control - SchoolSphere (Vikash)</title>
    <style>
        :root {
            --dark: #1a1c2c;
            --gold: #ffd700;
            --danger: #ff4757;
            --success: #2ed573;
        }

        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: #f1f2f6;
        }

        /* Top Header */
        .header {
            background: var(--dark);
            color: var(--gold);
            padding: 20px;
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .container { padding: 20px; max-width: 1000px; margin: auto; }

        /* Income Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .card h3 { margin: 0; color: #57606f; font-size: 16px; }
        .card p { margin: 10px 0 0; font-size: 28px; font-weight: bold; color: var(--dark); }

        /* School Table */
        .table-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            overflow-x: auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; background: #f8f9fa; color: #2f3542; border-bottom: 2px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #eee; }

        /* Action Buttons */
        .btn {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-block { background: var(--danger); color: white; }
        .btn-unblock { background: var(--success); color: white; }
        
        .status-badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .active { background: #e3fcef; color: #22863a; }
        .blocked { background: #ffeef0; color: #d73a49; }

    </style>
</head>
<body>

<div class="header">👑 VIKASH MASTER CONTROL PANEL</div>

<div class="container">
    
    <div class="stats-grid">
        <div class="card">
            <h3>कुल रजिस्टर्ड स्कूल</h3>
            <p id="totalSchools">1</p>
        </div>
        <div class="card">
            <h3>मंथली कमाई (Expected)</h3>
            <p style="color: #2ecc71;">₹ 1,000</p>
        </div>
        <div class="card">
            <h3>बंद पड़ी ID (Blocked)</h3>
            <p id="blockedSchools" style="color: #e74c3c;">0</p>
        </div>
    </div>

    <div class="table-container">
        <h3>स्कूलों की सूची (School Directory)</h3>
        <table>
            <thead>
                <tr>
                    <th>स्कूल का नाम</th>
                    <th>मालिक/प्रिंसिपल</th>
                    <th>मोबाइल नंबर</th>
                    <th>स्टेटस</th>
                    <th>एक्शन</th>
                </tr>
            </thead>
            <tbody id="schoolList">
                <tr id="row_001">
                    <td>Adarsh Higher Secondary</td>
                    <td>Ram Singh</td>
                    <td>9876543210</td>
                    <td><span class="status-badge active" id="status_001">ACTIVE</span></td>
                    <td>
                        <button class="btn btn-block" id="btn_001" onclick="controlSchool('001')">Block ID</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // कंट्रोल फंक्शन: यहीं से आप बटन दबाकर ब्लॉक करेंगे
    function controlSchool(id) {
        let btn = document.getElementById('btn_' + id);
        let status = document.getElementById('status_' + id);

        if (btn.innerText === "Block ID") {
            if (confirm("क्या आप वाकई इस स्कूल की सर्विस बंद करना चाहते हैं?")) {
                // स्टेटस बदलना
                status.innerText = "BLOCKED";
                status.className = "status-badge blocked";
                btn.innerText = "Unblock";
                btn.className = "btn btn-unblock";
                
                // लोकल स्टोरेज में सेव करना (बाद में इसे Firebase से जोड़ेंगे)
                localStorage.setItem("school_status_" + id, "blocked");
                alert("स्कूल ब्लॉक कर दिया गया है। अब उन्हें आपका नंबर दिखेगा।");
            }
        } else {
            status.innerText = "ACTIVE";
            status.className = "status-badge active";
            btn.innerText = "Block ID";
            btn.className = "btn btn-block";
            
            localStorage.setItem("school_status_" + id, "active");
            alert("स्कूल फिर से चालू कर दिया गया है।");
        }
    }
</script>

</body>
</html>
