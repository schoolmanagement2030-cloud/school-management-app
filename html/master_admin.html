<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Control - SchoolSphere (Vikash)</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        /* --- आपका 100% ओरिजिनल CSS (बिना किसी बदलाव के) --- */
        :root {
            --dark: #1a1c2c;
            --gold: #ffd700;
            --danger: #ff4757;
            --success: #2ed573;
        }

        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: #f1f2f6;
        }

        .header {
            background: var(--dark);
            color: var(--gold);
            padding: 20px;
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .container { padding: 20px; max-width: 1000px; margin: auto; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .card h3 { margin: 0; color: #57606f; font-size: 16px; }
        .card p { margin: 10px 0 0; font-size: 28px; font-weight: bold; color: var(--dark); }

        .table-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            overflow-x: auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; background: #f8f9fa; color: #2f3542; border-bottom: 2px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #eee; }

        .btn {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-block { background: var(--danger); color: white; }
        .btn-unblock { background: var(--success); color: white; }
        
        .status-badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .active { background: #e3fcef; color: #22863a; }
        .blocked { background: #ffeef0; color: #d73a49; }
    </style>
</head>
<body>

<div class="header">👑 VIKASH MASTER CONTROL PANEL</div>

<div class="container">
    
    <div class="stats-grid">
        <div class="card">
            <h3>कुल रजिस्टर्ड स्कूल</h3>
            <p id="totalSchools">0</p>
        </div>
        <div class="card">
            <h3>मंथली कमाई (Expected)</h3>
            <p style="color: #2ecc71;">₹ 1,000</p>
        </div>
        <div class="card">
            <h3>सुरक्षा लॉक (3 Wrong Tries)</h3>
            <p id="securityBlocks" style="color: #e74c3c;">0</p>
        </div>
    </div>

    <div class="table-container">
        <h3>स्कूलों की लाइव सूची (School Directory)</h3>
        <table>
            <thead>
                <tr>
                    <th>स्कूल आईडी</th>
                    <th>स्कूल का नाम</th>
                    <th>मोबाइल नंबर</th>
                    <th>स्टेटस</th>
                    <th>एक्शन</th>
                </tr>
            </thead>
            <tbody id="schoolList">
                </tbody>
        </table>
    </div>
</div>

<script>
    // --- 1. Firebase Initialize (आपके प्रोजेक्ट के लिए) ---
    const firebaseConfig = {
        apiKey: "AIzaSyBSgfU5OhUmLGwc6OBxgrudtZpqMCzgQpw",
        authDomain: "schoolsphere-824ca.firebaseapp.com",
        projectId: "schoolsphere-824ca",
        databaseURL: "https://schoolsphere-824ca-default-rtdb.firebaseio.com/",
        appId: "1:698409232180:android:7b25559d225a001d9f6761"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- 2. स्कूलों की लिस्ट लोड करना (Firebase Plus) ---
    db.ref('Schools').on('value', (snapshot) => {
        const schools = snapshot.val();
        let listHTML = "";
        let total = 0;
        let blockedCount = 0;

        for (let id in schools) {
            total++;
            let s = schools[id].status || "active";
            let name = schools[id].name || "Unnamed School";
            let ownerMobile = schools[id].ownerMobile || "N/A";

            if(s === "blocked") blockedCount++;

            let badgeClass = (s === "active") ? "active" : "blocked";
            let btnClass = (s === "active") ? "btn-block" : "btn-unblock";
            let btnText = (s === "active") ? "Block ID" : "Unblock";

            listHTML += `
                <tr>
                    <td><b>${id}</b></td>
                    <td>${name}</td>
                    <td>${ownerMobile}</td>
                    <td><span class="status-badge ${badgeClass}">${s.toUpperCase()}</span></td>
                    <td>
                        <button class="btn ${btnClass}" onclick="toggleSchool('${id}', '${s}')">${btnText}</button>
                    </td>
                </tr>
            `;
        }
        document.getElementById('schoolList').innerHTML = listHTML;
        document.getElementById('totalSchools').innerText = total;
        document.getElementById('securityBlocks').innerText = blockedCount;
    });

    // --- 3. कंट्रोल फंक्शन (Firebase Live Update Plus) ---
    function toggleSchool(id, currentStatus) {
        let newStatus = (currentStatus === "active") ? "blocked" : "active";
        let confirmMsg = (newStatus === "blocked") ? 
            "क्या आप वाकई इस स्कूल की सर्विस बंद करना चाहते हैं?" : 
            "क्या आप इस स्कूल को फिर से चालू करना चाहते हैं?";

        if (confirm(confirmMsg)) {
            // सीधे Firebase में अपडेट करें - पूरी दुनिया में जहाँ भी यह ऐप है, तुरंत असर होगा!
            db.ref('Schools/' + id).update({
                status: newStatus
            }).then(() => {
                alert("स्कूल स्टेटस सफलतापूर्वक अपडेट कर दिया गया है।");
            });
        }
    }
</script>

</body>
</html>
