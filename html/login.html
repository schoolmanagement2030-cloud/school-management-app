<!DOCTYPE html><html><head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SchoolSphere</title><style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
}

/* App Name */

.app-name{
font-size:40px;
margin-top:40px;
font-weight:bold;
color:gold;
letter-spacing:1px;
}

.tagline{
font-size:16px;
margin-bottom:40px;
color:#ddd;
}

/* Role Box */

.role-box{
width:85%;
margin:auto;
}

/* Base Role Button */

.role{
padding:16px;
margin:15px 0;
border-radius:30px;
font-size:18px;
cursor:pointer;
color:white;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
transition:0.3s;
}

.role:hover{
transform:scale(1.05);
}

/* Role Colors */

.owner{
background:linear-gradient(to right,#6a11cb,#2575fc);
}

.principal{
background:linear-gradient(to right,#2575fc,#4facfe);
}

.teacher{
background:linear-gradient(to right,#11998e,#38ef7d);
}

.driver{
background:linear-gradient(to right,#f2994a,#f2c94c);
}

.parent{
background:linear-gradient(to right,#ff5f6d,#ffc371);
}

/* Footer */

.footer{
margin-top:40px;
font-size:12px;
color:#bbb;
}

</style></head><body><div class="app-name">
SchoolSphere
</div><div class="tagline">
School Management App
</div><div class="role-box"><div class="role owner" onclick="owner()">👑 Owner / Super Admin</div><div class="role principal" onclick="principal()">🏫 Principal</div><div class="role teacher" onclick="teacher()">👨‍🏫 Teacher</div><div class="role driver" onclick="driver()">🚌 Driver</div><div class="role parent" onclick="parent()">👨‍👩‍👧 Parent</div></div><div class="footer">
© SchoolSphere ERP
</div><script>

/* Navigation fixed according to your project files */

function owner(){
window.location.href="superadmin.html";
}

function principal(){
window.location.href="principal.html";
}

function teacher(){
window.location.href="teacher.html";
}

function driver(){
window.location.href="driver.html";
}

function parent(){
window.location.href="parent.html";
}

</script></body>
</html>
