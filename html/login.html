<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SchoolSphere Login</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#eef2f3,#dfe9f3);
color:#333;
text-align:center;
margin:0;
}

.app-name{
font-size:34px;
margin-top:30px;
font-weight:bold;
color:#2c5364;
}

h2{
color:#444;
}

.login-box{
margin-top:50px;
}

input{
width:85%;
padding:12px;
margin:10px;
border:none;
border-radius:25px;
background:white;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
font-size:16px;
}

button{
padding:12px 40px;
background:linear-gradient(45deg,#4CAF50,#2ecc71);
border:none;
border-radius:25px;
color:white;
font-size:16px;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

button:hover{
opacity:0.9;
}

/* popup */

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
justify-content:center;
align-items:center;
}

.popup-box{
background:white;
padding:30px;
border-radius:12px;
text-align:center;
color:#333;
}

.popup-box button{
margin-top:15px;
}

</style>

</head>

<body>

<div class="app-name">
SchoolSphere
</div>

<h2>Principal Login</h2>

<div class="login-box">

<input id="mobile" placeholder="Principal Mobile">

<input id="password" type="password" placeholder="Password">

<br>

<button onclick="login()">Login</button>

</div>


<!-- success popup -->

<div class="popup" id="loginPopup">

<div class="popup-box">

<h3>Login Successful 🎉</h3>

<p id="welcomeText">Welcome Principal</p>

<button onclick="goDashboard()">Continue</button>

</div>

</div>


<script>

function login(){

let mobile=document.getElementById("mobile").value;
let pass=document.getElementById("password").value;

let savedMobile=localStorage.getItem("principalMobile");
let savedPass=localStorage.getItem("principalPass");
let principalName=localStorage.getItem("principalName");

if(mobile==savedMobile && pass==savedPass){

localStorage.setItem("principalLoggedIn","true");

document.getElementById("welcomeText").innerText =
"Welcome " + principalName;

document.getElementById("loginPopup").style.display="flex";

}else{

alert("गलत मोबाइल नंबर या पासवर्ड");

}

}

function goDashboard(){

window.location.href="principal.html";

}

</script>

</body>
</html>
