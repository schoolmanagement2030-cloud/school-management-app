<!DOCTYPE html>

<title>SchoolSphere</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
/* --- Aapka 100% Original Style (No Change) --- */
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
}

.app-name{
font-size:40px;
margin-top:40px;
font-weight:bold;
color:gold;
letter-spacing:1px;
}

.tagline{
font-size:16px;
margin-bottom:40px;
color:#ddd;
}

.role-box{
width:85%;
margin:auto;
}

.role{
padding:16px;
margin:15px 0;
border-radius:30px;
font-size:18px;
cursor:pointer;
color:white;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
transition:0.3s;
}

.role:hover{
transform:scale(1.05);
}

.owner{ background:linear-gradient(to right,#6a11cb,#2575fc); }
.principal{ background:linear-gradient(to right,#2575fc,#4facfe); }
.teacher{ background:linear-gradient(to right,#11998e,#38ef7d); }
.driver{ background:linear-gradient(to right,#f2994a,#f2c94c); }
.parent{ background:linear-gradient(to right,#ff5f6d,#ffc371); }

.footer{
margin-top:40px;
font-size:12px;
color:#bbb;
}

/* School ID box (Plus kiya gaya) */
.id-container { margin: 20px auto; }
#mainSchoolID {
    padding: 12px;
    border-radius: 20px;
    border: 2px solid gold;
    width: 220px;
    text-align: center;
    font-size: 16px;
}
</style>
</head>
<body>

<div class="app-name">SchoolSphere</div>
<div class="tagline">School Management App</div>

<div class="id-container">
    <input type="text" id="mainSchoolID" placeholder="Enter School ID (e.g. GPS001)">
</div>

<div class="role-box">
    <div class="role owner" onclick="checkRole('owner')">👑 Owner / Super Admin</div>
    <div class="role principal" onclick="checkRole('principal')">🏫 Principal</div>
    <div class="role teacher" onclick="checkRole('teacher')">👨‍🏫 Teacher</div>
    <div class="role driver" onclick="checkRole('driver')">🚌 Driver</div>
    <div class="role parent" onclick="checkRole('parent')">👨‍👩‍👧 Parent</div>
</div>

<div class="footer">© SchoolSphere ERP</div>

<script>
// --- Firebase Config (Plus) ---
const firebaseConfig = {
    apiKey: "AIzaSyBSgfU5OhUmLGwc6OBxgrudtZpqMCzgQpw",
    databaseURL: "https://schoolsphere-824ca-default-rtdb.firebaseio.com/",
    projectId: "schoolsphere-824ca"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// --- 3-Try Lock Logic (Naya Rule Plus) ---
let attemptCount = 0;

function checkRole(roleName) {
    let sID = document.getElementById("mainSchoolID").value;
    if(!sID) {
        alert("Pehle School ID bhariye!");
        return;
    }

    // Save ID for next pages
    localStorage.setItem("activeSchoolID", sID);
    localStorage.setItem("selectedRole", roleName);

    // Redirect to common login or specific page
    // Yahan hum login page par bhejenge jahan '3 Try' wala kaam hoga
    window.location.href = roleName + ".html";
}

           } else {

</script>
</body>
</html>
