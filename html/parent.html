<!DOCTYPE html>
<html>

<head>

<title>Parent Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#eef2f3,#dfe9f3);
text-align:center;
margin:0;
}

.header{
font-size:30px;
margin-top:20px;
color:#2c5364;
font-weight:bold;
}

.title{
font-size:22px;
margin-top:10px;
color:#444;
}

button{
display:block;
width:240px;
margin:12px auto;
padding:14px;
font-size:16px;
cursor:pointer;
border:none;
border-radius:25px;
background:linear-gradient(45deg,#4CAF50,#2ecc71);
color:white;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

button:hover{
opacity:0.9;
}

#status{
margin-top:10px;
font-weight:bold;
color:#333;
}

</style>

</head>

<body>

<div class="header">
Parent Dashboard
</div>

<h2 class="title">Student Panel</h2>

<button onclick="openStudent()">Student Details</button>

<button onclick="openAttendance()">Attendance</button>

<button onclick="openBus()">Bus Tracking</button>

<button onclick="openMessages()">Messages</button>

<button onclick="logout()">Logout</button>

<p id="status"></p>

<script>

function openStudent(){
document.getElementById("status").innerText="Student details coming soon";
}

function openAttendance(){
document.getElementById("status").innerText="Attendance feature coming soon";
}

function openBus(){
window.location.href="bus-map.html";
}

function openMessages(){
document.getElementById("status").innerText="No new messages";
}

function logout(){
window.location.href="login.html";
}

</script>

</body>

</html>
