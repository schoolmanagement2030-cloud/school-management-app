<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SchoolSphere</title><style>

body{
font-family:Arial;
background:linear-gradient(135deg,#fdfbfb 0%,#ebedee 100%);
color:#333;
text-align:center;
margin:0;
}

.app-name{
font-size:34px;
margin-top:30px;
font-weight:bold;
color:#2c5364;
}

h2{
color:#444;
}

.box{
margin-top:30px;
}

input{
width:85%;
padding:12px;
margin:10px;
border:none;
border-radius:25px;
background:white;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
font-size:16px;
}

button{
padding:12px 40px;
background:linear-gradient(45deg,#ff6b6b,#ff8c00);
border:none;
border-radius:25px;
color:white;
font-size:16px;
cursor:pointer;
box-shadow:0 5px 15px rgba(255,107,107,0.4);
}

button:hover{
opacity:0.9;
}

</style></head><body><div class="app-name">
SchoolSphere
</div><h2>School Registration</h2><div class="box"><input id="school" placeholder="School Name"><input id="address" placeholder="School Address"><input id="principal" placeholder="Principal Name"><input id="mobile" placeholder="Principal Mobile"><input id="password" type="password" placeholder="Password"><br><button onclick="register()">Register</button>

</div><script>

function register(){

localStorage.setItem("schoolName",
document.getElementById("school").value);

localStorage.setItem("schoolAddress",
document.getElementById("address").value);

localStorage.setItem("principalName",
document.getElementById("principal").value);

localStorage.setItem("principalMobile",
document.getElementById("mobile").value);

localStorage.setItem("principalPass",
document.getElementById("password").value);

alert("Registration Successful");

window.location.href="login.html";

}

</script></body>
</html>
