<!DOCTYPE html><html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SchoolSphere Login</title><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:linear-gradient(135deg,#141e30,#243b55);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
padding:30px;
border-radius:15px;
width:90%;
max-width:350px;
text-align:center;
color:white;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h2{
margin-bottom:25px;
font-size:28px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:25px;
border:none;
outline:none;
background:rgba(255,255,255,0.2);
color:white;
}

input::placeholder{
color:#ddd;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:25px;
background:#00c6ff;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0072ff;
}

.footer{
margin-top:15px;
font-size:12px;
opacity:0.7;
}

</style></head><body><div class="login-box"><h2>SchoolSphere</h2><input id="mobile" type="text" placeholder="मोबाइल नंबर"><input id="password" type="password" placeholder="पासवर्ड"><button onclick="login()">लॉगिन करें</button>

<div class="footer">
SchoolSphere System
</div></div><script>

function login(){

let mobile=document.getElementById("mobile").value;
let pass=document.getElementById("password").value;

if(mobile=="9784499059" && pass=="1234"){

window.location.href="dashboard.html";

}else{

alert("गलत मोबाइल नंबर या पासवर्ड");

}

}

</script></body>
</html>
