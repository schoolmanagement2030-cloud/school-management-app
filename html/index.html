<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SchoolSphere</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:#fff;
text-align:center;
margin:0;
}

/* App Name */

.app-name{
font-size:36px;
margin-top:30px;
font-weight:bold;
color:gold;
}

.tagline{
font-size:16px;
margin-top:5px;
color:#ddd;
}

/* Title */

h2{
color:white;
margin-top:20px;
}

/* Form Box */

.box{
margin-top:30px;
}

input{
width:85%;
padding:12px;
margin:10px;
border:none;
border-radius:25px;
background:white;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
font-size:16px;
}

/* Button */

button{
padding:12px 40px;
background:linear-gradient(45deg,#f1c40f,#f39c12);
border:none;
border-radius:25px;
color:black;
font-size:16px;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

button:hover{
opacity:0.9;
}

/* success popup */

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}

.popup-box{
background:white;
padding:30px;
border-radius:12px;
text-align:center;
color:black;
}

.popup-box button{
margin-top:15px;
}

</style>
</head>

<body>

<div class="app-name">
SchoolSphere
</div>

<div class="tagline">
School Management App
</div>

<h2>School Registration</h2>

<div class="box">

<input id="school" placeholder="School Name">

<input id="address" placeholder="School Address">

<input id="principal" placeholder="Principal Name">

<input id="mobile" placeholder="Principal Mobile">

<input id="password" type="password" placeholder="Password">

<br>

<button onclick="register()">Register</button>

</div>


<!-- Success Popup -->

<div class="popup" id="successPopup">

<div class="popup-box">

<h3>Registration Successful 🎉</h3>

<p>Your school has been registered.</p>

<button onclick="goLogin()">Go to Login</button>

</div>

</div>


<script>

function register(){

let school = document.getElementById("school").value;
let address = document.getElementById("address").value;
let principal = document.getElementById("principal").value;
let mobile = document.getElementById("mobile").value;
let password = document.getElementById("password").value;

if(school=="" || address=="" || principal=="" || mobile=="" || password==""){
alert("Please fill all fields");
return;
}

localStorage.setItem("schoolName",school);
localStorage.setItem("schoolAddress",address);
localStorage.setItem("principalName",principal);
localStorage.setItem("principalMobile",mobile);
localStorage.setItem("principalPass",password);

document.getElementById("successPopup").style.display="flex";

}

function goLogin(){
window.location.href="login.html";
}

</script>

</body>
</html>
