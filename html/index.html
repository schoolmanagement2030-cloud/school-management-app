<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SchoolSphere</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
/* --- आपका 100% ओरिजिनल CSS (बिना किसी बदलाव के) --- */
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
min-height: 100vh;
display: flex;
flex-direction: column;
justify-content: center;
}

.app-name{
font-size:40px;
font-weight:bold;
color:gold;
letter-spacing:1px;
margin-bottom: 5px;
}

.tagline{
font-size:16px;
margin-bottom:40px;
color:#ddd;
}

.role-box{
width:85%;
max-width: 400px;
margin:auto;
}

.role{
padding:16px;
margin:15px 0;
border-radius:30px;
font-size:18px;
cursor:pointer;
color:white;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
transition:0.3s;
text-decoration: none;
display: block;
border: none;
width: 100%;
font-weight: bold;
}

.role:hover{
transform:scale(1.05);
filter: brightness(1.1);
}

.owner{ background:linear-gradient(to right,#6a11cb,#2575fc); }
.principal{ background:linear-gradient(to right,#2575fc,#4facfe); }
.accountant{ background:linear-gradient(to right, #f2994a, #f2c94c); }
.teacher{ background:linear-gradient(to right,#11998e,#38ef7d); }
.driver{ background:linear-gradient(to right,#f2994a,#f2c94c); }
.parent{ background:linear-gradient(to right,#ff5f6d,#ffc371); }

.footer{
margin-top:40px;
font-size:12px;
color:#bbb;
padding-bottom: 20px;
}

@media (min-width: 768px) {
    .role-box {
        max-width: 600px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
    }
}

/* स्कूल आईडी बॉक्स के लिए छोटा सा स्टाइल प्लस किया है */
.id-input-box {
    margin-bottom: 20px;
}
.id-input-box input {
    padding: 12px;
    border-radius: 20px;
    border: 1px solid gold;
    width: 200px;
    text-align: center;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="app-name">SchoolSphere</div>
<div class="tagline">Smart School Management System</div>

<div class="id-input-box">
    <input type="text" id="masterSchoolID" placeholder="School ID (उदा. GPS001)">
</div>

<div class="role-box">
    <div class="role owner" onclick="owner()">👑 Owner / Super Admin</div>
    <div class="role principal" onclick="principal()">🏫 Principal</div>
    <div class="role accountant" onclick="accountant()">💰 Accountant</div>
    <div class="role teacher" onclick="teacher()">👨‍🏫 Teacher</div>
    <div class="role driver" onclick="driver()">🚌 Driver</div>
    <div class="role parent" onclick="parent()">👨‍👩‍👧 Parent</div>
</div>

<div class="footer">© 2026 SchoolSphere ERP</div>

<script>
// --- FIREBASE SETUP (आपके google-services.json से प्लस किया गया) ---
const firebaseConfig = {
    apiKey: "AIzaSyBSgfU5OhUmLGwc6OBxgrudtZpqMCzgQpw",
    authDomain: "schoolsphere-824ca.firebaseapp.com",
    projectId: "schoolsphere-824ca",
    databaseURL: "https://schoolsphere-824ca-default-rtdb.firebaseio.com/",
    appId: "1:698409232180:android:7b25559d225a001d9f6761"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// --- सुरक्षित रास्ता (Helper Function) ---
function checkAndGo(page) {
    let sID = document.getElementById("masterSchoolID").value;
    if(!sID && page !== 'superadmin.html') {
        alert("कृपया पहले अपनी School ID दर्ज करें!");
        return;
    }
    localStorage.setItem("activeSchoolID", sID);
    window.location.href = page;
}

/* --- आपके ओरिजिनल फंक्शन्स (अब 'प्लस' लॉजिक के साथ) --- */
function owner(){ checkAndGo("superadmin.html"); }
function principal(){ checkAndGo("principal.html"); }
function accountant(){ checkAndGo("accountant.html"); }
function teacher(){ checkAndGo("teacher.html"); }
function driver(){ checkAndGo("driver.html"); }
function parent(){ checkAndGo("parent.html"); }

</script>
</body>
</html>
