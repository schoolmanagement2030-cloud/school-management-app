<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Owner / Super Admin Login</title>
    <style>
        body { margin: 0; font-family: Arial; background: #f4f6f9; }
        .header { background: #2c5364; padding: 20px; text-align: center; color: white; }
        .app-name { font-size: 32px; font-weight: bold; color: gold; }
        .tagline { font-size: 14px; }

        .login-box {
            width: 90%;
            max-width: 400px;
            margin: 50px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .login-box h2 { margin-bottom: 20px; color: #2c5364; }
        .login-box input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
        }

        .login-box button {
            width: 95%;
            padding: 12px;
            border: none;
            border-radius: 25px;
            background: #3498db;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin: 10px 0;
        }

        .register-btn { background: #27ae60 !important; }
        .login-box button:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div class="header">
    <div class="app-name">SchoolSphere</div>
    <div class="tagline">School Management App</div>
</div>

<div class="login-box">
    <h2>Super Admin / Owner</h2>
    
    <input id="schoolName" placeholder="School Name (For Registration)">
    <input id="mobile" type="tel" placeholder="Mobile Number">
    <input id="password" type="password" placeholder="Password">
    
    <button onclick="login()">Login</button>
    <button class="register-btn" onclick="register()">Register School</button>
</div>

<script>
    // रजिस्ट्रेशन फंक्शन
    function register() {
        let school = document.getElementById("schoolName").value;
        let mobile = document.getElementById("mobile").value;
        let password = document.getElementById("password").value;

        if (school == "" || mobile == "" || password == "") {
            alert("कृपया स्कूल का नाम, मोबाइल और पासवर्ड तीनों भरें।");
        } else {
            // डेटा को सेव करना
            localStorage.setItem("schoolName", school);
            localStorage.setItem("ownerMobile", mobile);
            localStorage.setItem("ownerPassword", password);

            alert("बधाई हो! " + school + " सफलतापूवर्क रजिस्टर हो गया है।");
            
            // रजिस्ट्रेशन के बाद इनपुट साफ़ करना
            document.getElementById("schoolName").value = "";
        }
    }

    // लॉगिन फंक्शन
    function login() {
        let mobile = document.getElementById("mobile").value;
        let password = document.getElementById("password").value;

        let savedMobile = localStorage.getItem("ownerMobile");
        let savedPass = localStorage.getItem("ownerPassword");

        if (mobile == "" || password == "") {
            alert("लॉगिन करने के लिए मोबाइल और पासवर्ड भरें।");
            return;
        }

        if (mobile === savedMobile && password === savedPass) {
            alert("लॉगिन सफल! स्वागत है " + localStorage.getItem("schoolName"));
            window.location.href = "superadmin.html";
        } else {
            alert("गलत मोबाइल नंबर या पासवर्ड! कृपया पहले रजिस्टर करें।");
        }
    }
</script>

</body>
</html>
