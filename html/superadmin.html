<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Admin Panel</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

/* Header */

.header{
background:#2c5364;
padding:20px;
text-align:center;
color:white;
}

.app-name{
font-size:32px;
font-weight:bold;
color:gold;
}

.tagline{
font-size:14px;
}

/* Dashboard */

.dashboard{
padding:20px;
text-align:center;
}

.card{
background:white;
padding:20px;
margin:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
font-size:18px;
}

.menu button{
margin:10px;
padding:12px 25px;
border:none;
border-radius:25px;
background:#3498db;
color:white;
font-size:16px;
cursor:pointer;
}

.menu button:hover{
background:#2980b9;
}

.logout{
margin-top:30px;
background:#e74c3c;
}

</style>
</head>

<body>

<div class="header">

<div class="app-name">SchoolSphere</div>
<div class="tagline">School Management App</div>

</div>

<div class="dashboard">

<h2>Super Admin Dashboard</h2>

<div class="card">
Total Students : 0
</div>

<div class="card">
Total Teachers : 0
</div>

<div class="card">
Total Drivers : 0
</div>

<div class="card">
School Balance : ₹0
</div>

<div class="menu">

<button>Principal Management</button>

<button>Student Management</button>

<button>Teacher Management</button>

<button>Driver Management</button>

<button>Fees & Accounts</button>

<button>Reports</button>

<button>Notifications</button>

</div>

<button class="logout" onclick="logout()">Logout</button>

</div>

<script>

function logout(){
window.location.href="index.html";
}

</script>

</body>
</html>
