<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Owner / Super Admin Login</title><style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

/* Header */

.header{
background:#2c5364;
padding:20px;
text-align:center;
color:white;
}

.app-name{
font-size:32px;
font-weight:bold;
color:gold;
}

.tagline{
font-size:14px;
}

/* Login Box */

.login-box{
width:90%;
max-width:400px;
margin:80px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

.login-box h2{
margin-bottom:20px;
}

.login-box input{
width:90%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

.login-box button{
padding:12px 25px;
border:none;
border-radius:25px;
background:#3498db;
color:white;
font-size:16px;
cursor:pointer;
margin:10px;
}

.login-box button:hover{
opacity:0.9;
}

.register-btn{
background:#27ae60;
}

</style></head><body><div class="header"><div class="app-name">SchoolSphere</div>
<div class="tagline">School Management App</div></div><div class="login-box"><h2>Owner / Super Admin</h2><input id="mobile" placeholder="Mobile Number"><input id="password" type="password" placeholder="Password"><br><button onclick="login()">Login</button>

<button class="register-btn" onclick="register()">Register School</button>

</div><script>

function register(){

let mobile=document.getElementById("mobile").value;
let password=document.getElementById("password").value;

if(mobile=="" || password==""){

alert("Enter Mobile and Password");

}else{

localStorage.setItem("ownerMobile",mobile);
localStorage.setItem("ownerPassword",password);

alert("School Registered Successfully");

}

}

function login(){

let mobile=document.getElementById("mobile").value;
let password=document.getElementById("password").value;

let savedMobile=localStorage.getItem("ownerMobile");
let savedPass=localStorage.getItem("ownerPassword");

if(mobile==savedMobile && password==savedPass){

window.location.href="superadmin.html";

}else{

alert("Wrong Mobile or Password");

}

}

</script></body>
</html>
