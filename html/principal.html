<!DOCTYPE html>
<html>

<head>

<title>Principal Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#eef2f3,#dfe9f3);
text-align:center;
margin:0;
}

.title{
font-size:30px;
margin-top:20px;
color:#2c5364;
}

.school{
font-size:18px;
color:#555;
margin-bottom:20px;
}

button{
display:block;
width:240px;
margin:12px auto;
padding:14px;
font-size:16px;
cursor:pointer;
border:none;
border-radius:25px;
background:linear-gradient(45deg,#4CAF50,#2ecc71);
color:white;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

button:hover{
opacity:0.9;
}

</style>

</head>

<body>

<h1 class="title">Principal Dashboard</h1>

<div class="school" id="schoolName"></div>

<button onclick="openStudents()">Manage Students</button>

<button onclick="openTeachers()">Manage Teachers</button>

<button onclick="openDrivers()">Manage Drivers</button>

<button onclick="openParents()">Manage Parents</button>

<button onclick="openBus()">Bus Routes</button>

<button onclick="openExpenses()">Expenses</button>

<button onclick="openMessages()">Messages</button>

<button onclick="logout()">Logout</button>


<script>

document.getElementById("schoolName").innerText =
"School : " + localStorage.getItem("schoolName");


function openStudents(){
alert("Students section coming soon");
}

function openTeachers(){
window.location.href="teacher.html";
}

function openDrivers(){
window.location.href="driver.html";
}

function openParents(){
window.location.href="parent.html";
}

function openBus(){
window.location.href="bus-map.html";
}

function openExpenses(){
alert("Expenses section coming soon");
}

function openMessages(){
alert("Messages section coming soon");
}

function logout(){
window.location.href="login.html";
}

</script>

</body>

</html>
