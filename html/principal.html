<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Parent Login - SchoolSphere</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        /* --- आपका 100% ओरिजिनल CSS (बिना किसी बदलाव के) --- */
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#eef2f3,#dfe9f3);
            margin: 0;
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #parentBlockScreen {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: white;
            z-index: 10000;
            padding-top: 60px;
        }

        .alert-box {
            background: #fff5f5;
            border: 2px solid #feb2b2;
            display: inline-block;
            padding: 30px;
            border-radius: 20px;
            width: 85%;
            max-width: 350px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .header {
            font-size: 30px;
            color: #2c5364;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 85%;
            max-width: 350px;
            margin: auto;
        }

        input {
            display: block; width: 100%; margin: 12px auto;
            padding: 14px; font-size: 16px; border-radius: 25px;
            border: 1px solid #ccc; outline: none; box-sizing: border-box;
        }

        button {
            display: block; width: 100%; margin: 12px auto;
            padding: 14px; font-size: 16px; cursor: pointer;
            border: none; border-radius: 25px;
            background: linear-gradient(45deg,#4CAF50,#2ecc71);
            color: white; font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        button:hover { opacity: 0.9; }

        .contact-card {
            margin-top: 20px;
            padding: 15px;
            background: #eef2f3;
            border-radius: 12px;
            font-size: 14px;
            color: #34495e;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div id="parentBlockScreen">
    <div class="alert-box">
        <h1 style="color: #c53030; font-size: 24px;">खाता निष्क्रिय (Account Inactive)</h1>
        <p id="blockMessage" style="font-size: 16px; color: #4a5568;">आपकी पेरेंट आईडी अभी चालू नहीं है।</p>
        
        <div class="contact-card">
            <p><b>अधिक जानकारी के लिए संपर्क करें:</b></p>
            <p>🏫 स्कूल प्रिंसिपल (Principal Office)</p>
            <p>अथवा</p>
            <p>💰 अकाउंट सेक्शन (Accountant)</p>
        </div>
        
        <p style="font-size: 12px; color: #a0aec0; margin-top: 15px;">असुविधा के लिए खेद है।</p>
    </div>
</div>

<div id="loginArea">
    <div class="header">Parent Login</div>
    <div class="login-box">
        <input id="schoolID" type="text" placeholder="स्कूल आईडी (जैसे GPS001)">
        <input id="mobile" type="number" placeholder="अभिभावक मोबाइल नंबर">
        <input id="password" type="password" placeholder="पासवर्ड">
        <button onclick="login()">Login</button>
    </div>
</div>

<script>
    // --- 1. Firebase Initialize (प्लस किया गया) ---
    const firebaseConfig = {
        apiKey: "AIzaSyBSgfU5OhUmLGwc6OBxgrudtZpqMCzgQpw",
        authDomain: "schoolsphere-824ca.firebaseapp.com",
        projectId: "schoolsphere-824ca",
        databaseURL: "https://schoolsphere-824ca-default-rtdb.firebaseio.com/",
        appId: "1:698409232180:android:7b25559d225a001d9f6761"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // लॉगिन की कोशिशों को गिनने के लिए (3-Try Rule)
    let loginAttempts = 0;

    function login() {
        let sID = document.getElementById("schoolID").value;
        let mobile = document.getElementById("mobile").value;
        let password = document.getElementById("password").value;

        if(!sID || !mobile || !password) { alert("सभी जानकारी भरें!"); return; }

        // --- Firebase से डेटा चेक करना (प्लस किया गया) ---
        db.ref('Schools/' + sID + '/Parents/' + mobile).once('value', (snap) => {
            const parentData = snap.val();

            if (parentData) {
                // 1. क्या आईडी पहले से ब्लॉक है?
                if (parentData.status === "blocked") {
                    document.getElementById("blockMessage").innerText = parentData.blockReason || "आपकी आईडी बंद है, प्रिंसिपल से संपर्क करें।";
                    document.getElementById("parentBlockScreen").style.display = "block";
                    document.getElementById("loginArea").style.display = "none";
                    return;
                }

                // 2. पासवर्ड चेक
                if (parentData.password === password) {
                    
                    // --- आपका डिवाइस लॉक सिस्टम ---
                    let currentDevice = "PARENT_PHONE_XYZ"; // यहाँ फोन की असली आईडी आएगी
                    if (!parentData.deviceID) {
                        db.ref('Schools/' + sID + '/Parents/' + mobile).update({ deviceID: currentDevice });
                    } else if (parentData.deviceID !== currentDevice) {
                        alert("सुरक्षा कारणों से यह आईडी केवल आपके पंजीकृत फोन पर ही चलेगी।");
                        return;
                    }

                    // लॉगिन सफल: डेटा सेव करें
                    localStorage.setItem("activeSchoolID", sID);
                    localStorage.setItem("parentMobile", mobile);
                    window.location.href = "parent-dashboard.html";

                } else {
                    // गलत पासवर्ड पर 3-Try Rule (प्लस किया गया)
                    loginAttempts++;
                    if (loginAttempts >= 3) {
                        db.ref('Schools/' + sID + '/Parents/' + mobile).update({ 
                            status: "blocked",
                            blockReason: "3 बार गलत पासवर्ड डालने के कारण आईडी बंद कर दी गई है।" 
                        });
                        alert("3 बार गलत पासवर्ड! आईडी ब्लॉक हो गई है। प्रिंसिपल से मिलें।");
                    } else {
                        alert("गलत पासवर्ड! आपके पास " + (3 - loginAttempts) + " कोशिशें बची हैं।");
                    }
                }
            } else {
                alert("गलत स्कूल आईडी या मोबाइल नंबर!");
            }
        });
    }
</script>

</body>
</html>
