<button onclick="login()">Login</button>
<button class="register-btn" onclick="goToRegister()">Register School</button>

<script>
// रजिस्टर पेज पर भेजने के लिए
function goToRegister(){
    window.location.href = "register.html"; 
}

function login(){
    let mobile = document.getElementById("mobile").value;
    let password = document.getElementById("password").value;

    // लोकल स्टोरेज से डेटा चेक करना
    let savedMobile = localStorage.getItem("ownerMobile");
    let savedPass = localStorage.getItem("ownerPassword");

    if(mobile === savedMobile && password === savedPass && mobile !== null){
        alert("लॉगिन सफल रहा!");
        window.location.href = "superadmin.html";
    } else {
        alert("गलत मोबाइल नंबर या पासवर्ड। कृपया पहले रजिस्टर करें।");
    }
}
</script>
