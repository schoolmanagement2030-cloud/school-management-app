<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchoolSphere - Owner / Super Admin</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f6f9;
        }

        /* Header Section */
        .header {
            background: linear-gradient(135deg, #2c5364, #203a43, #0f2027);
            padding: 30px 20px;
            text-align: center;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .app-name {
            font-size: 36px;
            font-weight: bold;
            color: #ffd700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .tagline {
            font-size: 16px;
            margin-top: 5px;
            opacity: 0.9;
        }

        /* Login & Register Box */
        .container {
            width: 90%;
            max-width: 450px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            margin-bottom: 25px;
            color: #2c5364;
            font-size: 24px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            border-radius: 8px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            font-size: 16px;
            background: #fafafa;
        }

        input:focus {
            border-color: #3498db;
            outline: none;
            background: #fff;
        }

        /* Buttons */
        .btn-group {
            margin-top: 20px;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 15px;
        }

        .login-btn {
            background: #3498db;
            color: white;
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
        }

        .login-btn:hover {
            background: #2980b9;
        }

        .register-btn {
            background: #27ae60;
            color: white;
            box-shadow: 0 4px 10px rgba(39, 174, 96, 0.3);
        }

        .register-btn:hover {
            background: #219150;
        }

        /* Toggle Text */
        .toggle-link {
            margin-top: 15px;
            color: #7f8c8d;
            font-size: 14px;
            cursor: pointer;
            text-decoration: underline;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="app-name">SchoolSphere</div>
    <div class="tagline">School Management Excellence</div>
</div>

<div class="container" id="loginSection">
    <h2>Owner Login</h2>
    <input type="tel" id="loginMobile" placeholder="Mobile Number">
    <input type="password" id="loginPassword" placeholder="Password">
    
    <div class="btn-group">
        <button class="login-btn" onclick="login()">Login Now</button>
    </div>
    
    <div class="toggle-link" onclick="showRegister()">New School? Register Here</div>
</div>

<div class="container hidden" id="registerSection">
    <h2>Register School</h2>
    <input type="text" id="regSchoolName" placeholder="School Full Name">
    <input type="tel" id="regMobile" placeholder="Mobile Number">
    <input type="password" id="regPassword" placeholder="Set Password">
    
    <div class="btn-group">
        <button class="register-btn" onclick="register()">Register & Save</button>
    </div>
    
    <div class="toggle-link" onclick="showLogin()">Already have a School? Login</div>
</div>

<script>
    // सेक्शन्स को आपस में बदलने के लिए
    function showRegister() {
        document.getElementById("loginSection").classList.add("hidden");
        document.getElementById("registerSection").classList.remove("hidden");
    }

    function showLogin() {
        document.getElementById("registerSection").classList.add("hidden");
        document.getElementById("loginSection").classList.remove("hidden");
    }

    // रजिस्ट्रेशन फंक्शन
    function register() {
        let school = document.getElementById("regSchoolName").value;
        let mobile = document.getElementById("regMobile").value;
        let password = document.getElementById("regPassword").value;

        if (school === "" || mobile === "" || password === "") {
            alert("कृपया सभी जानकारी भरें!");
            return;
        }

        // डेटा को लोकल स्टोरेज में सेव करना
        localStorage.setItem("ownerMobile", mobile);
        localStorage.setItem("ownerPassword", password);
        localStorage.setItem("schoolName", school);

        alert("बधाई हो! " + school + " रजिस्टर हो गया है। अब लॉगिन करें।");
        showLogin(); // रजिस्ट्रेशन के बाद लॉगिन पेज पर भेजें
    }

    // लॉगिन फंक्शन
    function login() {
        let mobile = document.getElementById("loginMobile").value;
        let password = document.getElementById("loginPassword").value;

        // सेव किया हुआ डेटा लाना
        let savedMobile = localStorage.getItem("ownerMobile");
        let savedPass = localStorage.getItem("ownerPassword");
        let savedSchool = localStorage.getItem("schoolName");

        if (mobile === "" || password === "") {
            alert("कृपया मोबाइल और पासवर्ड भरें!");
            return;
        }

        if (mobile === savedMobile && password === savedPass) {
            alert("स्वागत है! " + savedSchool);
            window.location.href = "superadmin.html"; // यहाँ आपके अगले पेज का नाम आएगा
        } else {
            alert("गलत मोबाइल नंबर या पासवर्ड! कृपया चेक करें या रजिस्टर करें।");
        }
    }
</script>

</body>
</html>
