<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accountant Dashboard - SchoolSphere</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e67e22;
            --success: #27ae60;
            --sidebar-width: 260px;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- Desktop Sidebar Layout --- */
        .wrapper {
            display: flex;
            flex: 1;
        }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--primary);
            color: white;
            padding: 20px;
            display: none; /* Mobile par chhupa rahega */
        }

        .main-content {
            flex: 1;
            padding: 20px;
            box-sizing: border-box;
        }

        .header {
            background: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* --- Cards & Grid --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
            border-top: 5px solid var(--accent);
        }

        .data-section {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 25px;
        }

        /* --- Form Elements --- */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        input, select {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            width: 100%;
            box-sizing: border-box;
        }

        .btn-print {
            background: var(--success);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        #map { height: 350px; border-radius: 12px; margin-top: 15px; }

        /* --- Responsive Queries (Computer vs Mobile) --- */
        @media (min-width: 768px) {
            .sidebar { display: block; } /* Computer par sidebar dikhega */
            .btn-print { width: auto; }   /* Computer par button chhota ho jayega */
            .header { margin-left: 20px; border-radius: 10px; margin-top: 10px; }
        }

        @media (max-width: 767px) {
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .main-content { padding: 10px; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="sidebar">
        <h2 style="color: gold;">SchoolSphere</h2>
        <hr>
        <p>📊 Dashboard</p>
        <p>💰 Fees Collection</p>
        <p>🚌 Transport Audit</p>
        <p>📄 Salary Slips</p>
        <p>📉 Expenses</p>
    </div>

    <div class="main-content">
        <div class="header">
            <h2 style="margin:0; color: #2c3e50;">Accountant Portal</h2>
            <div id="schoolDisplay" style="font-weight: bold; color: var(--accent);">School Name</div>
        </div>

        <br>

        <div class="stats-grid">
            <div class="stat-card">
                <h4>आज की कुल दूरी</h4>
                <p id="liveKm" style="font-size: 24px; color: var(--primary);">0.00 KM</p>
            </div>
            <div class="stat-card">
                <h4>अनुमानित डीजल खर्च</h4>
                <p id="expectedFuel" style="font-size: 24px; color: var(--primary);">0.00 Ltr</p>
            </div>
            <div class="stat-card">
                <h4>कुल फीस जमा</h4>
                <p style="font-size: 24px; color: var(--success);">₹ 0.00</p>
            </div>
        </div>

        <div class="data-section">
            <h3>Live Bus Monitoring (Fuel Audit)</h3>
            <div id="map"></div>
        </div>

        <div class="data-section">
            <h3>Staff Salary & Expenses (सैलरी रसीद)</h3>
            <div class="form-grid">
                <input type="text" id="staffName" placeholder="Staff Name">
                <select id="staffRole">
                    <option value="Driver">Bus Driver</option>
                    <option value="Conductor">Conductor</option>
                    <option value="Teacher">Teacher</option>
                    <option value="Sweeper">Sweeper</option>
                </select>
                <input type="number" id="amt" placeholder="Amount (₹)">
                <input type="text" id="busId" placeholder="Bus Number">
            </div>
            <button class="btn-print" onclick="generateSlip()">Print Salary Voucher (PDF)</button>
        </div>
    </div>
</div>

<script>
    // School Name from LocalStorage
    document.getElementById("schoolDisplay").innerText = localStorage.getItem("schoolName") || "Official Panel";

    // Map Setup
    var map = L.map('map').setView([26.8467, 80.9462], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    function generateSlip() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        let name = document.getElementById("staffName").value;
        let role = document.getElementById("staffRole").value;
        let amount = document.getElementById("amt").value;

        if(!name || !amount) { alert("Details bhariye!"); return; }

        doc.setFontSize(20);
        doc.text("Salary Slip - " + (localStorage.getItem("schoolName") || "SchoolSphere"), 20, 20);
        doc.setFontSize(14);
        doc.text("Name: " + name, 20, 40);
        doc.text("Role: " + role, 20, 50);
        doc.text("Amount: Rs. " + amount, 20, 60);
        doc.text("Date: " + new Date().toLocaleDateString(), 20, 70);
        
        doc.save(name + "_slip.pdf");
    }
</script>

</body>
</html>
