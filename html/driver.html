<!DOCTYPE html><html><head><title>Driver Login</title><meta name="viewport" content="width=device-width, initial-scale=1"><style>

body{
font-family:Arial;
background:linear-gradient(135deg,#eef2f3,#dfe9f3);
margin:0;
text-align:center;
}

.header{
font-size:30px;
margin-top:40px;
color:#2c5364;
font-weight:bold;
}

.login-box{
margin-top:40px;
}

input{
display:block;
width:260px;
margin:12px auto;
padding:14px;
font-size:16px;
border-radius:25px;
border:1px solid #ccc;
}

button{
display:block;
width:240px;
margin:12px auto;
padding:14px;
font-size:16px;
cursor:pointer;
border:none;
border-radius:25px;
background:linear-gradient(45deg,#4CAF50,#2ecc71);
color:white;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

button:hover{
opacity:0.9;
}

</style></head><body><div class="header">
Driver Login
</div><div class="login-box"><input id="mobile" placeholder="Driver Mobile"><input id="password" type="password" placeholder="Password"><button onclick="login()">Login</button>

</div><script>

function login(){

let mobile=document.getElementById("mobile").value;
let password=document.getElementById("password").value;

let savedMobile=localStorage.getItem("driverMobile");
let savedPass=localStorage.getItem("driverPass");

if(mobile==savedMobile && password==savedPass){

window.location.href="driver-dashboard.html";

}else{

alert("Wrong Mobile or Password");

}

}

</script></body></html>
