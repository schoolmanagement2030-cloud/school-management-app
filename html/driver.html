<!DOCTYPE html>
<html>

<head>

<title>Driver Panel</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#eef2f3,#dfe9f3);
margin:0;
text-align:center;
}

.header{
font-size:30px;
margin-top:20px;
color:#2c5364;
font-weight:bold;
}

.title{
font-size:22px;
margin-top:10px;
color:#444;
}

.card{
margin-top:20px;
}

button{
display:block;
width:240px;
margin:12px auto;
padding:14px;
font-size:16px;
cursor:pointer;
border:none;
border-radius:25px;
background:linear-gradient(45deg,#4CAF50,#2ecc71);
color:white;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

button:hover{
opacity:0.9;
}

.alert{
background:linear-gradient(45deg,#ff4b2b,#ff416c);
}

.messages{
margin:20px;
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

#status{
margin-top:10px;
font-weight:bold;
color:#333;
}

</style>

</head>

<body>

<div class="header">
Driver Panel
</div>

<h2 class="title">Bus Duty</h2>

<div class="card">

<button onclick="startDuty()">On Duty Today</button>

<button onclick="stopDuty()">Off Duty Today</button>

<button class="alert" onclick="sendAlert()">🚨 Emergency Alert</button>

<button onclick="logout()">Logout</button>

<p id="status"></p>

</div>

<div class="messages">

<h3>Messages</h3>

<div id="messageList">
No Messages
</div>

</div>

<script>

function startDuty(){
document.getElementById("status").innerText="Driver is On Duty";
}

function stopDuty(){
document.getElementById("status").innerText="Driver is Off Duty";
}

function sendAlert(){
alert("Emergency alert sent to school!");
}

function logout(){
window.location.href="login.html";
}

</script>

</body>

</html>
