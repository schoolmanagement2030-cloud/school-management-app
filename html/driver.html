<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Driver Login - SchoolSphere</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#eef2f3,#dfe9f3);
            margin: 0;
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* --- ड्राइवर के लिए ब्लॉक स्क्रीन --- */
        #driverBlockScreen {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: white;
            z-index: 10000;
            padding-top: 60px;
        }

        .alert-box {
            background: #fff5f5;
            border: 2px solid #feb2b2;
            display: inline-block;
            padding: 30px;
            border-radius: 20px;
            width: 85%;
            max-width: 350px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .header {
            font-size: 30px;
            color: #2c5364;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 85%;
            max-width: 350px;
            margin: auto;
        }

        input {
            display: block; width: 100%; margin: 12px auto;
            padding: 14px; font-size: 16px; border-radius: 25px;
            border: 1px solid #ccc; outline: none; box-sizing: border-box;
        }

        button {
            display: block; width: 100%; margin: 12px auto;
            padding: 14px; font-size: 16px; cursor: pointer;
            border: none; border-radius: 25px;
            background: linear-gradient(45deg,#4CAF50,#2ecc71);
            color: white; font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        button:hover { opacity: 0.9; }

        .contact-card {
            margin-top: 20px;
            padding: 15px;
            background: #eef2f3;
            border-radius: 12px;
            font-size: 14px;
            color: #34495e;
        }
    </style>
</head>
<body>

<div id="driverBlockScreen">
    <div class="alert-box">
        <h1 style="color: #c53030;">पहुँच वर्जित (No Access)</h1>
        <p style="font-size: 16px; color: #4a5568;">आपकी ड्राइवर आईडी अभी सक्रिय नहीं है।</p>
        
        <div class="contact-card">
            <p><b>कृपया समाधान के लिए संपर्क करें:</b></p>
            <p>🏫 स्कूल प्रिंसिपल (Principal)</p>
            <p>या</p>
            <p>💰 स्कूल अकाउंटेंट (Accountant)</p>
        </div>
        
        <p style="font-size: 12px; color: #a0aec0; margin-top: 15px;">आईडी चालू होने के बाद ही आप लॉगिन कर पाएंगे।</p>
    </div>
</div>

<div id="loginArea">
    <div class="header">Driver Login</div>
    <div class="login-box">
        <input id="mobile" type="number" placeholder="ड्राइवर मोबाइल नंबर">
        <input id="password" type="password" placeholder="पासवर्ड">
        <button onclick="login()">Login</button>
    </div>
</div>

<script>
    // ब्लॉक स्टेटस चेक करना
    function checkDriverStatus() {
        // यह मान प्रिंसिपल के 'Manage Staff' सेक्शन से आएगा
        let isBlocked = localStorage.getItem("status_driver_" + document.getElementById("mobile").value) === "blocked";
        // या अगर पूरा स्कूल (प्रिंसिपल) ब्लॉक है
        let isSchoolBlocked = localStorage.getItem("master_block_status") === "blocked";

        if (isBlocked || isSchoolBlocked) {
            document.getElementById("driverBlockScreen").style.display = "block";
            document.getElementById("loginArea").style.display = "none";
            return true;
        }
        return false;
    }

    function login() {
        let mobile = document.getElementById("mobile").value;
        let password = document.getElementById("password").value;

        // पहले चेक करें कि ब्लॉक तो नहीं है
        if (checkDriverStatus()) return;

        // यहाँ वो डेटा है जो प्रिंसिपल ने ड्राइवर के लिए बनाया था
        let savedMobile = localStorage.getItem("driverMobile");
        let savedPass = localStorage.getItem("driverPass");

        if (mobile == savedMobile && password == savedPass) {
            
            // डिवाइस लॉक (पहली बार लॉगिन पर फोन आईडी सेव करना)
            let savedDevice = localStorage.getItem("driver_device_" + mobile);
            let currentDevice = "DRIVER_PHONE_123"; // असली डिवाइस आईडी

            if (!savedDevice) {
                localStorage.setItem("driver_device_" + mobile, currentDevice);
            } else if (savedDevice !== currentDevice) {
                alert("यह आईडी सिर्फ आपके पुराने फोन पर चलेगी। फोन बदलने के लिए प्रिंसिपल से मिलें।");
                return;
            }

            window.location.href = "driver-dashboard.html";
        } else {
            alert("गलत मोबाइल नंबर या पासवर्ड");
        }
    }
</script>

</body>
</html>
