<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Driver Dashboard - SchoolSphere Pro</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/nosleep/0.12.0/NoSleep.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root { --primary: #1a1c2c; --gold: #ffd700; --success: #2ecc71; --danger: #e74c3c; --bg: #f4f7f6; }
body { margin:0; font-family: 'Segoe UI', sans-serif; background:var(--bg); padding-bottom: 30px; }

/* 🗺️ Map Section */
#map { height: 200px; width: 100%; border-bottom: 4px solid var(--primary); }

/* 🔘 Trip Control */
.trip-panel { background: var(--primary); color: white; padding: 20px; text-align: center; border-radius: 0 0 30px 30px; }
.btn-trip { 
    width: 100%; padding: 18px; border-radius: 50px; border: none; 
    font-size: 20px; font-weight: bold; cursor: pointer; transition: 0.3s; 
}
.start { background: var(--success); color: white; box-shadow: 0 10px 20px rgba(46,204,113,0.3); }
.stop { background: var(--danger); color: white; box-shadow: 0 10px 20px rgba(231,76,60,0.3); }

.status-bar { background: #000; color: var(--gold); padding: 5px; font-size: 11px; text-align: center; }

/* 👨‍🎓 Students List */
.card { background: white; padding: 15px; margin: 15px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
.student-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee; }
.btn-stu { padding: 12px; width: 45%; border: none; border-radius: 10px; font-weight: bold; color: white; }

/* 🔔 Msg Box */
#msg-box { background: #fff3cd; border-left: 5px solid #ffa000; padding: 15px; margin: 15px; border-radius: 12px; display: none; }
</style>
</head>
<body>

<div class="status-bar" id="gps-status">GPS: Offline | Background: Off</div>

<div class="trip-panel">
    <h3 id="trip-label" style="margin:0 0 10px 0;">Trip Status: Stopped</h3>
    <button id="mainTripBtn" class="btn-trip start" onclick="toggleTrip()">START TRIP 🚌</button>
</div>

<div id="map"></div>

<div id="msg-box"></div>

<div class="card">
    <h3 style="margin:0 0 15px 0;"><i class="fas fa-users"></i> Student Pickup/Drop</h3>
    <div id="student-list">लोड हो रहा है...</div>
</div>

<script>
// 🔥 Firebase Init
const firebaseConfig = { 
    apiKey: "AIzaSyBSgfU5OhUmLGwc6OBxgrudtZpqMCzgQpw", 
    databaseURL: "https://schoolsphere-824ca-default-rtdb.firebaseio.com/", 
    projectId: "schoolsphere-824ca" 
};
if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const sID = localStorage.getItem("activeSchoolID") || "demo01";
const busID = localStorage.getItem("busID") || "BUS001";
const today = new Date().toISOString().slice(0, 10);

// 🛠️ Background Tools
let noSleep = new NoSleep();
let isTripRunning = false;
let watchID = null;
let wakeLock = null;

// 🗺️ Map Init
let map = L.map('map', {zoomControl: false}).setView([26.8, 80.9], 15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let busMarker = L.marker([26.8, 80.9]).addTo(map);
let polyline = L.polyline([], {color: 'blue', weight: 4}).addTo(map);

// 🔊 Voice
function speak(text) {
    window.speechSynthesis.cancel();
    let msg = new SpeechSynthesisUtterance(text);
    msg.lang = "hi-IN";
    window.speechSynthesis.speak(msg);
}

// 🔴 1. TRIP CONTROL (Start/Stop Background)
async function toggleTrip() {
    const btn = document.getElementById("mainTripBtn");
    const label = document.getElementById("trip-label");

    if (!isTripRunning) {
        // Start
        isTripRunning = true;
        btn.innerText = "STOP TRIP 🛑";
        btn.classList.replace("start", "stop");
        label.innerText = "Trip Status: Running (Background Active)";
        
        noSleep.enable(); // फोन को सोने नहीं देगा
        requestWakeLock(); // प्रोसेसर को जगाए रखेगा
        startTracking();
        speak("ट्रिप शुरू हो गई है, अब आप स्क्रीन बंद कर सकते हैं");
    } else {
        // Stop
        isTripRunning = false;
        btn.innerText = "START TRIP 🚌";
        btn.classList.replace("stop", "start");
        label.innerText = "Trip Status: Stopped";
        
        noSleep.disable();
        if(wakeLock) wakeLock.release();
        stopTracking();
        speak("ट्रिप समाप्त हो गई है");
    }
}

// 📡 2. GPS TRACKING LOGIC
function startTracking() {
    if (!("geolocation" in navigator)) return;

    watchID = navigator.geolocation.watchPosition(pos => {
        let lat = pos.coords.latitude;
        let lng = pos.coords.longitude;

        document.getElementById("gps-status").innerText = `GPS: Live | Lat: ${lat.toFixed(4)} | Lng: ${lng.toFixed(4)}`;
        
        // UI Update
        busMarker.setLatLng([lat, lng]);
        map.panTo([lat, lng]);
        polyline.addLatLng([lat, lng]);

        // Firebase Update
        let locData = { lat, lng, time: Date.now() };
        if(navigator.onLine) {
            db.ref(`Schools/${sID}/Buses/${busID}/liveLocation`).set(locData);
            db.ref(`Schools/${sID}/GPSLogs/${busID}/${today}`).push(locData);
        }
    }, err => {
        document.getElementById("gps-status").innerText = "GPS Error ❌";
    }, { enableHighAccuracy: true, maximumAge: 0 });
}

function stopTracking() {
    if (watchID) navigator.geolocation.clearWatch(watchID);
    db.ref(`Schools/${sID}/Buses/${busID}/liveLocation`).remove();
}

// 🔐 WakeLock Helper
async function requestWakeLock() {
    try {
        if ('wakeLock' in navigator) {
            wakeLock = await navigator.wakeLock.request('screen');
        }
    } catch (err) { console.log("WakeLock Failed"); }
}

// 👨‍🎓 3. ATTENDANCE & STUDENTS
function markAttendance(stuID, stuName, type) {
    db.ref(`Schools/${sID}/Attendance/${today}/${stuID}`).update({
        [type]: new Date().toLocaleTimeString(),
        name: stuName,
        bus: busID
    }).then(() => {
        speak(`${stuName} ${type === 'PICK' ? 'बोर्डेड' : 'ड्रॉप्ड'}`);
    });
}

db.ref(`Schools/${sID}/Students`).orderByChild('busID').equalTo(busID).on('value', snap => {
    const list = document.getElementById("student-list");
    list.innerHTML = "";
    snap.forEach(child => {
        let s = child.val();
        list.innerHTML += `
        <div class="student-row">
            <b>${s.name}</b>
            <div style="width:55%; display:flex; gap:5px;">
                <button class="btn-stu" style="background:var(--success)" onclick="markAttendance('${child.key}','${s.name}','PICK')">PICK</button>
                <button class="btn-stu" style="background:var(--danger)" onclick="markAttendance('${child.key}','${s.name}','DROP')">DROP</button>
            </div>
        </div>`;
    });
});

// 🔔 MESSAGES
db.ref(`Schools/${sID}/Messages/${busID}`).limitToLast(1).on('child_added', snap => {
    let m = snap.val();
    if(m && m.time > Date.now() - 5000) {
        let box = document.getElementById("msg-box");
        box.style.display = "block";
        box.innerHTML = `<b>Message:</b> ${m.text}`;
        speak("सावधान, प्रिंसिपल का संदेश: " + m.text);
    }
});

</script>
</body>
</html>
