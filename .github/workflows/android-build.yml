name: Build Android APK (Live System)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Initialize Capacitor Project
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/cli @capacitor/android
        # ✅ 'html' फोल्डर बनाना ज़रूरी है क्योंकि Capacitor इसे वेब डायरेक्टरी मानता है
        mkdir -p html
        
        npx cap init SchoolSphere com.vikash.schoolapp --web-dir=html
        
        # 🔥 यहाँ सुधार किया गया है: URL अब फोल्डर (/html/) पर खत्म होता है
        # इससे index.html लोड होगी और उसके बाद वाले सारे बटन (owner, teacher) भी काम करेंगे
        echo '{
          "appId": "com.vikash.schoolapp",
          "appName": "SchoolSphere",
          "webDir": "html",
          "server": {
            "url": "https://schoolmanagement2030-cloud.github.io/school-management-app/html/",
            "cleartext": true,
            "allowNavigation": ["schoolmanagement2030-cloud.github.io"]
          }
        }' > capacitor.config.json

    - name: Add Android Platform
      run: |
        npx cap add android || echo "Android exists"
        npx cap copy

    - name: Fix Android Permissions and Kotlin
      run: |
        # 🌐 WebView को इंटरनेट चलाने की परमिशन देना
        sed -i "/<application/a \        android:usesCleartextTraffic=\"true\"" android/app/src/main/AndroidManifest.xml
        
        # 🛠️ Kotlin Duplicate Class Error का पक्का इलाज
        echo "configurations.all { resolutionStrategy { force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'; force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'; force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22' } }" >> android/app/build.gradle

    - name: Build APK
      run: |
        cd android
        echo "android.useAndroidX=true" > gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        chmod +x gradlew
        ./gradlew assembleDebug -x lint --no-daemon 
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: school-app-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
