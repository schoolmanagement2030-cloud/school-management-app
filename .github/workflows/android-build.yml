name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20  # लेटेस्ट और स्टेबल वर्जन

    # यह स्टेप बहुत जरूरी है, इसके बिना Android बिल्ड नहीं बनेगा
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install Dependencies
      run: |
        npm install
        npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Sync Capacitor
      run: |
        # अगर android फोल्डर पहले से है तो sync करें, वरना add करें
        npx cap sync android || npx cap add android

    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew clean assembleDebug  # clean जोड़ने से पुरानी एरर वाली फाइल्स हट जाएंगी

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: school-app-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
