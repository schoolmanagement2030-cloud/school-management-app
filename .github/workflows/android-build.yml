name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Initialize Project
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/cli @capacitor/android
        npx cap init SchoolSphere com.vikash.schoolapp --web-dir=html

    - name: Add Android Platform
      run: |
        npx cap add android || echo "Android exists"
        npx cap copy

    # यहाँ हमने डुप्लिकेट एरर को फिक्स करने के लिए सेटिंग डाली है
    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true

