name: Build Android APK (Live System)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Initialize Capacitor Project
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/cli @capacitor/android
        mkdir -p html
        # सादा init करें
        npx cap init SchoolSphere com.vikash.schoolapp --web-dir=html
        
        # ✅ यहाँ जादू है: config फाइल में Live URL डालना
        echo '{
          "appId": "com.vikash.schoolapp",
          "appName": "SchoolSphere",
          "webDir": "html",
          "server": {
            "url": "https://schoolmanagement2030-cloud.github.io/school-management-app/index.html",
            "cleartext": true
          }
        }' > capacitor.config.json

    - name: Add Android Platform
      run: |
        npx cap add android || echo "Android exists"
        npx cap copy

    - name: Fix Android Permissions and Kotlin
      run: |
        # 🌐 WebView इंटरनेट परमिशन
        sed -i '/<application/a \        android:usesCleartextTraffic="true"' android/app/src/main/AndroidManifest.xml
        # 🛠️ Kotlin Fix
        echo "configurations.all { resolutionStrategy { force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'; force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'; force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22' } }" >> android/app/build.gradle

    - name: Build APK
      run: |
        cd android
        echo "android.useAndroidX=true" > gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        chmod +x gradlew
        ./gradlew assembleDebug -x lint --no-daemon 
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: school-app-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
