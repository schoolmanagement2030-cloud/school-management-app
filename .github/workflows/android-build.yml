name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Initialize Project
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/cli @capacitor/android
        npx cap init SchoolSphere com.vikash.schoolapp --web-dir=html

    - name: Add Android Platform
      run: |
        npx cap add android || echo "Android exists"
        npx cap copy

    - name: Fix Kotlin Duplicate Issues
      run: |
        # यह स्टेप आपके दिए हुए exclude वाले कोड को build.gradle में जोड़ देगा
        sed -i '/dependencies {/a \    constraints {\n        implementation("org.jetbrains.kotlin:kotlin-stdlib:1.8.22") {\n            because("kotlin-stdlib-jdk7 and jdk8 are merged into stdlib since 1.8.0")\n        }\n    }' android/app/build.gradle

    - name: Build APK
      run: |
        cd android
        echo "android.useAndroidX=true" > gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        chmod +x gradlew
        ./gradlew assembleDebug -x lint --no-daemon -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: school-app-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
