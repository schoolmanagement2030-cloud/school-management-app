name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Create APK Folder
        run: mkdir apk

      - name: Copy Website Files
        run: |
          cp -r html apk/
          cp -r css apk/
          cp -r js apk/

      - name: Zip Files
        run: zip -r school-app.zip apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: school-app
          path: school-app.zip
