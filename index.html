<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchoolSphere - Management System</title>
    <!-- PWA Manifest -->
    <link rel="manifest" href='data:application/json,{"name":"SchoolSphere","short_name":"Sphere","start_url":".","display":"standalone","background_color":"#020617","theme_color":"#2563eb","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/2940/2940651.png","sizes":"512x512","type":"image/png"}]}'>
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2940/2940651.png">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .selection\:bg-blue-500\/30 ::selection { background-color: rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 selection:bg-blue-500/30">
    <div id="root"></div>

    <!-- React and Libraries via ESM.sh -->
    <script type="module">
        import React, { useState, useEffect, useRef } from 'https://esm.sh/react@19.0.0';
        import { createRoot } from 'https://esm.sh/react-dom@19.0.0/client';
        import { 
            LayoutDashboard, UserPlus, Mail, Home, Users, GraduationCap, 
            BookOpen, Bus, Settings, LogOut, Menu, X, ChevronRight, 
            BarChart3, Clock, Calendar, CheckCircle2, AlertCircle, Loader2,
            Navigation, MapPin
        } from 'https://esm.sh/lucide-react@0.468.0';
        import { motion, AnimatePresence } from 'https://esm.sh/motion@12.0.0/react';
        import htm from 'https://esm.sh/htm';
        const html = htm.bind(React.createElement);
        
        // Firebase Imports
        import { initializeApp } from 'https://esm.sh/firebase@10.8.0/app';
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from 'https://esm.sh/firebase@10.8.0/auth';
        import { 
            getFirestore, collection, addDoc, doc, getDoc, getDocs, setDoc, 
            serverTimestamp, onSnapshot, query, where, limit, orderBy 
        } from 'https://esm.sh/firebase@10.8.0/firestore';
        import { getStorage, ref, uploadBytes, getDownloadURL } from 'https://esm.sh/firebase@10.8.0/storage';

        // ==========================================
        // SchoolSphere - Production Configuration
        // ==========================================
        // 1. Create a project at https://console.firebase.google.com
        // 2. Enable Auth (Google), Firestore, and Storage
        // 3. Paste your Web App configuration below:
        const firebaseConfig = {
            apiKey: "REPLACE_WITH_YOUR_API_KEY",
            authDomain: "REPLACE_WITH_YOUR_AUTH_DOMAIN",
            projectId: "REPLACE_WITH_YOUR_PROJECT_ID",
            storageBucket: "REPLACE_WITH_YOUR_STORAGE_BUCKET",
            messagingSenderId: "REPLACE_WITH_YOUR_MESSAGING_SENDER_ID",
            appId: "REPLACE_WITH_YOUR_APP_ID",
            measurementId: "REPLACE_WITH_YOUR_MEASUREMENT_ID",
            firestoreDatabaseId: "(default)" // Change if using a named database
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app, firebaseConfig.firestoreDatabaseId);
        const storage = getStorage(app);

        // Helper for Firestore Errors
        function handleFirestoreError(error, operationType, path) {
            const errInfo = {
                error: error instanceof Error ? error.message : String(error),
                authInfo: {
                    userId: auth.currentUser?.uid,
                    email: auth.currentUser?.email,
                },
                operationType,
                path
            };
            console.error('Firestore Error: ', JSON.stringify(errInfo));
            throw new Error(JSON.stringify(errInfo));
        }

        // Firestore Services
        const firestoreService = {
            async createSchool(schoolData, ownerId) {
                if (!ownerId) throw new Error("Owner ID is required");
                const schoolPath = 'schools';
                try {
                    const schoolRef = await addDoc(collection(db, schoolPath), {
                        ...schoolData,
                        ownerId,
                        createdAt: serverTimestamp()
                    });
                    const schoolId = schoolRef.id;
                    await setDoc(doc(db, 'users', ownerId), { schoolId }, { merge: true });
                    return schoolId;
                } catch (error) {
                    handleFirestoreError(error, 'write', schoolPath);
                }
            },
            async getSchools() {
                const path = 'schools';
                try {
                    const q = query(collection(db, path), orderBy('createdAt', 'desc'));
                    const snapshot = await getDocs(q);
                    return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                } catch (error) {
                    handleFirestoreError(error, 'get', path);
                    return [];
                }
            },
            async saveAdmission(data, schoolId) {
                if (!schoolId) throw new Error("School ID is required for admission");
                const path = 'students';
                try {
                    return await addDoc(collection(db, path), {
                        ...data,
                        schoolId,
                        createdAt: serverTimestamp()
                    });
                } catch (error) {
                    handleFirestoreError(error, 'write', path);
                }
            },
            async saveContact(data, schoolId) {
                if (!schoolId) throw new Error("School ID is required for contact");
                const path = 'contacts';
                try {
                    return await addDoc(collection(db, path), {
                        ...data,
                        schoolId,
                        createdAt: serverTimestamp()
                    });
                } catch (error) {
                    handleFirestoreError(error, 'write', path);
                }
            },
            async getUserProfile(uid) {
                if (!uid) return null;
                const path = `users/${uid}`;
                try {
                    const docRef = doc(db, 'users', uid);
                    const docSnap = await getDoc(docRef);
                    if (docSnap.exists()) {
                        return docSnap.data();
                    }
                    return null;
                } catch (error) {
                    handleFirestoreError(error, 'get', path);
                    return null;
                }
            },
            async getSchoolData(schoolId) {
                if (!schoolId) return null;
                const path = `schools/${schoolId}`;
                try {
                    const docRef = doc(db, 'schools', schoolId);
                    const docSnap = await getDoc(docRef);
                    return docSnap.exists() ? docSnap.data() : null;
                } catch (error) {
                    handleFirestoreError(error, 'get', path);
                    return null;
                }
            },
            async updateBusLocation(busId, lat, lng, schoolId) {
                if (!busId || !schoolId) return;
                const path = `locations/${busId}`;
                try {
                    await setDoc(doc(db, 'locations', busId), {
                        busId,
                        lat,
                        lng,
                        schoolId,
                        timestamp: serverTimestamp()
                    });
                } catch (error) {
                    handleFirestoreError(error, 'write', path);
                }
            },
            async saveExpense(data, schoolId) {
                if (!schoolId) throw new Error("School ID is required for expenses");
                const path = 'expenses';
                try {
                    return await addDoc(collection(db, path), {
                        ...data,
                        schoolId,
                        createdAt: serverTimestamp()
                    });
                } catch (error) {
                    handleFirestoreError(error, 'write', path);
                }
            },
            async getCollectionData(path, schoolId) {
                if (!schoolId) return [];
                try {
                    const q = query(
                        collection(db, path), 
                        where('schoolId', '==', schoolId),
                        orderBy('createdAt', 'desc')
                    );
                    const snapshot = await getDocs(q);
                    return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                } catch (error) {
                    handleFirestoreError(error, 'get', path);
                    return [];
                }
            }
        };

        const storageService = {
            async uploadReceipt(file) {
                if (!file) return null;
                const storageRef = ref(storage, `receipts/${Date.now()}_${file.name}`);
                await uploadBytes(storageRef, file);
                return await getDownloadURL(storageRef);
            }
        };

        // Error Boundary Component
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            componentDidCatch(error, errorInfo) {
                console.error("ErrorBoundary caught an error", error, errorInfo);
            }
            render() {
                if (this.state.hasError) {
                    return html`
                        <div className="min-h-screen bg-slate-950 flex items-center justify-center p-6">
                            <div className="bg-slate-900 border border-red-900/50 p-8 rounded-3xl max-w-md w-full text-center">
                                <${AlertCircle} className="w-16 h-16 text-red-500 mx-auto mb-4" />
                                <h2 className="text-2xl font-bold text-white mb-2">Something went wrong</h2>
                                <p className="text-slate-400 mb-6">${this.state.error?.message || "An unexpected error occurred."}</p>
                                <button onClick=${() => window.location.reload()} className="px-6 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold transition-all">Reload Application</button>
                            </div>
                        </div>
                    `;
                }
                return this.props.children;
            }
        }

        const SuperAdminPanel = ({ firestoreService }) => {
            const [schools, setSchools] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState('');

            useEffect(() => {
                const fetchSchools = async () => {
                    try {
                        const data = await firestoreService.getSchools();
                        setSchools(data || []);
                    } catch (error) {
                        console.error("SuperAdminPanel fetch error:", error);
                    } finally {
                        setLoading(false);
                    }
                };
                fetchSchools();
            }, []);

            const filteredSchools = schools.filter(s => 
                s.schoolName.toLowerCase().includes(searchTerm.toLowerCase()) ||
                s.ownerName.toLowerCase().includes(searchTerm.toLowerCase()) ||
                s.id.toLowerCase().includes(searchTerm.toLowerCase())
            );

            if (loading) return html`<div className="flex justify-center p-12"><${Loader2} className="w-8 h-8 animate-spin text-blue-500" /></div>`;

            return html`
                <div className="space-y-6">
                    <div className="flex flex-wrap items-center justify-between gap-4 bg-slate-900 p-6 rounded-2xl border border-slate-800">
                        <div>
                            <h2 className="text-xl font-bold text-white">Global School Directory</h2>
                            <p className="text-slate-500 text-sm">Monitoring ${schools.length} registered institutions</p>
                        </div>
                        <div className="relative flex-1 max-w-md">
                            <input 
                                type="text" 
                                value=${searchTerm}
                                onInput=${(e) => setSearchTerm(e.target.value)}
                                className="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2 text-white outline-none focus:ring-2 focus:ring-blue-500 pl-10" 
                                placeholder="Search by name, owner, or ID..." 
                            />
                            <${Users} className="absolute left-3 top-2.5 w-5 h-5 text-slate-500" />
                        </div>
                    </div>

                    <div className="grid grid-cols-1 gap-4">
                        ${filteredSchools.map(school => html`
                            <div key=${school.id} className="bg-slate-900 border border-slate-800 p-6 rounded-2xl hover:border-blue-500/50 transition-all group">
                                <div className="flex flex-wrap items-start justify-between gap-4">
                                    <div className="flex gap-4">
                                        <div className="w-12 h-12 bg-blue-600/10 rounded-xl flex items-center justify-center group-hover:bg-blue-600/20 transition-all">
                                            <${Home} className="w-6 h-6 text-blue-400" />
                                        </div>
                                        <div>
                                            <h3 className="text-lg font-bold text-white">${school.schoolName}</h3>
                                            <div className="text-xs font-mono text-slate-500 uppercase tracking-tighter">ID: ${school.id}</div>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-8 flex-1 max-w-3xl">
                                        <div>
                                            <div className="text-xs text-slate-500 font-bold uppercase mb-1">Owner</div>
                                            <div className="text-sm text-slate-300">${school.ownerName}</div>
                                            <div className="text-xs text-slate-500">${school.ownerPhone}</div>
                                        </div>
                                        <div>
                                            <div className="text-xs text-slate-500 font-bold uppercase mb-1">Principal</div>
                                            <div className="text-sm text-slate-300">${school.principalName}</div>
                                            <div className="text-xs text-slate-500">${school.principalPhone}</div>
                                        </div>
                                        <div>
                                            <div className="text-xs text-slate-500 font-bold uppercase mb-1">Created</div>
                                            <div className="text-sm text-slate-300">${school.createdAt ? school.createdAt.toDate().toLocaleDateString() : 'N/A'}</div>
                                        </div>
                                        <div className="flex items-center justify-end">
                                            <button className="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg text-xs font-bold transition-all border border-slate-700">View Summary</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `)}
                        ${filteredSchools.length === 0 && html`
                            <div className="text-center py-20 bg-slate-900/50 rounded-3xl border border-dashed border-slate-800">
                                <${AlertCircle} className="w-12 h-12 text-slate-700 mx-auto mb-4" />
                                <p className="text-slate-500">No schools found matching your search.</p>
                            </div>
                        `}
                    </div>
                </div>
            `;
        };

        function App() {
            const [currentPage, setCurrentPage] = useState('home');
            const [user, setUser] = useState(null);
            const [userProfile, setUserProfile] = useState(null);
            const [schoolData, setSchoolData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [formLoading, setFormLoading] = useState(false);
            const [feedback, setFeedback] = useState(null);
            const [schools, setSchools] = useState([]);

            useEffect(() => {
                const fetchSchools = async () => {
                    const data = await firestoreService.getSchools();
                    setSchools(data || []);
                };
                fetchSchools();
            }, []);
            
            // Bus Tracking States
            const [isTracking, setIsTracking] = useState(false);
            const [currentLocation, setCurrentLocation] = useState(null);
            const [busLocation, setBusLocation] = useState(null);
            const [trackingError, setTrackingError] = useState(null);
            const watchId = useRef(null);
            const lastUpdate = useRef(0);

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, async (currentUser) => {
                    try {
                        setUser(currentUser);
                        if (currentUser) {
                            const profile = await firestoreService.getUserProfile(currentUser.uid);
                            setUserProfile(profile);
                            if (profile && profile.schoolId) {
                                const school = await firestoreService.getSchoolData(profile.schoolId);
                                setSchoolData(school);
                            }
                        } else {
                            setUserProfile(null);
                            setSchoolData(null);
                        }
                    } catch (error) {
                        console.error("Auth state change error:", error);
                    } finally {
                        setLoading(false);
                    }
                });
                return () => unsubscribe();
            }, []);

            // Real-time Bus Tracking for Parents/Students
            useEffect(() => {
                if (userProfile && userProfile.schoolId && userProfile.role !== 'superadmin' && (userProfile.role === 'student' || userProfile.role === 'principal' || userProfile.role === 'owner')) {
                    const assignedBusId = userProfile.assignedBusId || 'bus-001';
                    try {
                        const unsubscribe = onSnapshot(
                            doc(db, 'locations', assignedBusId), 
                            (snapshot) => {
                                if (snapshot.exists()) {
                                    const data = snapshot.data();
                                    // Ensure data belongs to the same school
                                    if (data && data.schoolId === userProfile.schoolId) {
                                        setBusLocation(data);
                                    }
                                }
                            },
                            (error) => {
                                console.error("Bus tracking error:", error);
                            }
                        );
                        return () => unsubscribe();
                    } catch (error) {
                        console.error("Failed to setup bus tracking snapshot:", error);
                    }
                }
            }, [userProfile]);

            const currentRole = userProfile?.role || 'student';

            const handleLogout = async () => {
                try {
                    if (isTracking) stopTrip();
                    await signOut(auth);
                    setCurrentPage('home');
                } catch (error) {
                    console.error('Logout error:', error);
                }
            };

            const startTrip = () => {
                if (!navigator.geolocation) {
                    setTrackingError("Geolocation is not supported by your browser");
                    return;
                }

                setIsTracking(true);
                setTrackingError(null);

                watchId.current = navigator.geolocation.watchPosition(
                    (position) => {
                        const { latitude, longitude } = position.coords;
                        setCurrentLocation({ lat: latitude, lng: longitude });

                        // Throttle updates to every 5 seconds
                        const now = Date.now();
                        if (now - lastUpdate.current > 5000) {
                            const busId = userProfile?.busId || (user?.uid ? `bus-${user.uid.substring(0, 5)}` : null);
                            if (busId && userProfile?.schoolId) {
                                firestoreService.updateBusLocation(busId, latitude, longitude, userProfile.schoolId);
                                lastUpdate.current = now;
                            }
                        }
                    },
                    (error) => {
                        setTrackingError(error.message);
                        setIsTracking(false);
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            };

            const stopTrip = () => {
                if (watchId.current) {
                    navigator.geolocation.clearWatch(watchId.current);
                    watchId.current = null;
                }
                setIsTracking(false);
            };

            const navItems = [
                { id: 'home', label: 'Home', icon: Home },
                { id: 'admission', label: 'Admission', icon: UserPlus },
                { id: 'contact', label: 'Contact', icon: Mail },
                { id: 'dashboard', label: 'Dashboard', icon: LayoutDashboard },
            ];

            if (loading) {
                return html`
                    <div className="min-h-screen bg-slate-950 flex items-center justify-center">
                        <${Loader2} className="w-12 h-12 text-blue-500 animate-spin" />
                    </div>
                `;
            }

            const renderHome = () => html`
                <div className="space-y-20 pb-20">
                    <section className="relative h-[80vh] flex items-center justify-center overflow-hidden">
                        <div className="absolute inset-0 bg-gradient-to-br from-blue-900 via-slate-900 to-black opacity-90 z-0" />
                        <div className="absolute inset-0 z-[-1]">
                            <img src="https://images.unsplash.com/photo-1523050854058-8df90110c9f1?auto=format&fit=crop&q=80&w=2000" alt="School Building" className="w-full h-full object-cover" referrerPolicy="no-referrer" />
                        </div>
                        <div className="container mx-auto px-6 relative z-10 text-center">
                            <${motion.h1} initial=${{ opacity: 0, y: 20 }} animate=${{ opacity: 1, y: 0 }} className="text-5xl md:text-7xl font-bold text-white mb-6">
                                Welcome to <span className="text-blue-400">SchoolSphere</span>
                            <//>
                            <${motion.p} initial=${{ opacity: 0, y: 20 }} animate=${{ opacity: 1, y: 0 }} transition=${{ delay: 0.2 }} className="text-xl text-slate-300 max-w-2xl mx-auto mb-10">
                                Empowering the next generation with modern education management tools. Seamlessly connecting students, teachers, and administrators.
                            <//>
                            <${motion.div} initial=${{ opacity: 0, y: 20 }} animate=${{ opacity: 1, y: 0 }} transition=${{ delay: 0.4 }} className="flex flex-wrap justify-center gap-4">
                                <button onClick=${() => setCurrentPage('admission')} className="px-8 py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-full font-semibold transition-all shadow-lg shadow-blue-900/20">Apply Now</button>
                                <button onClick=${() => setCurrentPage('dashboard')} className="px-8 py-3 bg-slate-800 hover:bg-slate-700 text-white rounded-full font-semibold border border-slate-700 transition-all">View Dashboard</button>
                            <//>
                        </div>
                    </section>
                    <section className="container mx-auto px-6">
                        <div className="text-center mb-16">
                            <h2 className="text-3xl md:text-4xl font-bold text-white mb-4">Why Choose SchoolSphere?</h2>
                            <div className="h-1 w-20 bg-blue-500 mx-auto rounded-full" />
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                            ${[
                                { icon: GraduationCap, title: "Academic Excellence", desc: "Track student progress with advanced analytics and personalized learning paths." },
                                { icon: Users, title: "Collaborative Learning", desc: "Integrated tools for teachers and students to interact and share resources." },
                                { icon: Bus, title: "Smart Logistics", desc: "Real-time bus tracking and automated attendance systems for safety." }
                            ].map((feature, i) => html`
                                <${motion.div} key=${i} whileHover=${{ y: -10 }} className="p-8 bg-slate-800/50 border border-slate-700 rounded-2xl hover:bg-slate-800 transition-all">
                                    <${feature.icon} className="w-12 h-12 text-blue-400 mb-6" />
                                    <h3 className="text-xl font-bold text-white mb-4">${feature.title}</h3>
                                    <p className="text-slate-400 leading-relaxed">${feature.desc}</p>
                                <//>
                            `)}
                        </div>
                    </section>
                </div>
            `;

            const renderAdmissionForm = () => html`
                <div className="container mx-auto px-6 py-20 max-w-4xl">
                    <${motion.div} initial=${{ opacity: 0, scale: 0.95 }} animate=${{ opacity: 1, scale: 1 }} className="bg-slate-800 border border-slate-700 rounded-3xl p-8 md:p-12 shadow-2xl">
                        <div className="mb-10">
                            <h2 className="text-3xl font-bold text-white mb-2">Admission Application</h2>
                            <p className="text-slate-400">Join our academic community. Please fill in the details below.</p>
                        </div>
                        <form onSubmit=${async (e) => {
                            e.preventDefault();
                            setFormLoading(true);
                            setFeedback(null);
                            const formData = new FormData(e.currentTarget);
                            const selectedSchoolId = formData.get('schoolId');
                            const data = {
                                fullName: formData.get('fullName'),
                                dob: formData.get('dob'),
                                grade: formData.get('grade'),
                                parentName: formData.get('parentName'),
                                email: formData.get('email'),
                                phone: formData.get('phone'),
                                previousSchool: formData.get('previousSchool'),
                                schoolId: selectedSchoolId,
                                status: 'pending',
                                createdAt: new Date()
                            };
                            try {
                                await firestoreService.saveAdmission(data, selectedSchoolId);
                                setFeedback({ type: 'success', message: 'Application submitted successfully!' });
                                e.target.reset();
                            } catch (error) {
                                setFeedback({ type: 'error', message: 'Failed to submit application.' });
                            } finally {
                                setFormLoading(false);
                            }
                        }} className="space-y-8">
                            ${feedback && html`
                                <div className=${`p-4 rounded-xl flex items-center gap-3 ${feedback.type === 'success' ? 'bg-green-900/20 text-green-400 border border-green-800' : 'bg-red-900/20 text-red-400 border border-red-800'}`}>
                                    ${feedback.type === 'success' ? html`<${CheckCircle2} className="w-5 h-5" />` : html`<${AlertCircle} className="w-5 h-5" />`}
                                    <span className="text-sm font-medium">${feedback.message}</span>
                                </div>
                            `}
                            <div className="space-y-2">
                                <label className="text-sm font-medium text-slate-300">Select School</label>
                                <select name="schoolId" required className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                                    <option value="">Choose a school...</option>
                                    ${schools.map(s => html`<option value=${s.id}>${s.schoolName}</option>`)}
                                </select>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="space-y-2">
                                    <label className="text-sm font-medium text-slate-300">Student Full Name</label>
                                    <input name="fullName" required type="text" className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="John Doe" />
                                </div>
                                <div className="space-y-2">
                                    <label className="text-sm font-medium text-slate-300">Date of Birth</label>

                                        <h3 className="text-xl font-bold text-white mb-6">Recent Notifications</h3>
                                        <div className="space-y-4">
                                            ${[1, 2, 3].map((_, i) => html`
                                                <div key=${i} className="flex items-center gap-4 p-4 hover:bg-slate-800 rounded-xl transition-all cursor-pointer">

                                <div className="mt-10 bg-slate-900 border border-slate-800 rounded-2xl p-8">
                                    <h3 className="text-2xl font-bold text-white mb-6 flex items-center gap-2">
                                        <${BarChart3} className="text-blue-400" />

                                    </h3>
                                    <div className="max-w-xl">
                                        <form onSubmit=${async (e) => {
                                            e.preventDefault();
                                            setFormLoading(true);
                                            setFeedback(null);
                                            const formData = new FormData(e.currentTarget);
                                            const file = formData.get('receipt');
                                            const amount = formData.get('amount');
                                            const category = formData.get('category');
                                            const description = formData.get('description');

                                            if (!amount || !category || !file.name) {
                                                setFeedback({ type: 'error', message: 'Please fill all required fields and select a file.' });
                                                setFormLoading(false);
                                                return;
                                            }

                                            try {
                                                const receiptUrl = await storageService.uploadReceipt(file);
                                                await firestoreService.saveExpense({
                                                    amount: parseFloat(amount),
                                                    category,
                                                    description,
                                                    receiptUrl,
                                                    submittedBy: user.uid,
                                                    schoolId: userProfile.schoolId,
                                                    status: 'pending'
                                                }, userProfile.schoolId);
                                                setFeedback({ type: 'success', message: 'Expense and receipt uploaded successfully!' });
                                                e.target.reset();
                                            } catch (error) {
                                                setFeedback({ type: 'error', message: 'Failed to upload expense.' });
                                            } finally {
                                                setFormLoading(false);
                                            }
                                        }} className="space-y-6">
                                            ${feedback && html`
                                                <div className=${`p-4 rounded-xl flex items-center gap-3 ${feedback.type === 'success' ? 'bg-green-900/20 text-green-400 border border-green-800' : 'bg-red-900/20 text-red-400 border border-red-800'}`}>
                                                    ${feedback.type === 'success' ? html`<${CheckCircle2} className="w-5 h-5" />` : html`<${AlertCircle} className="w-5 h-5" />`}
                                                    <span className="text-sm font-medium">${feedback.message}</span>
                                                </div>
                                            `}
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                <div className="space-y-2">
                                                    <label className="text-sm font-medium text-slate-300">Amount ($)</label>
                                                    <input name="amount" required type="number" step="0.01" className="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white outline-none focus:ring-2 focus:ring-blue-500" placeholder="0.00" />
                                                </div>
                                                <div className="space-y-2">
                                                    <label className="text-sm font-medium text-slate-300">Category</label>
                                                    <select name="category" className="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white outline-none focus:ring-2 focus:ring-blue-500">
                                                        <option value="diesel">Diesel/Fuel</option>
                                                        <option value="maintenance">Maintenance</option>
                                                        <option value="supplies">Office Supplies</option>
                                                        <option value="other">Other</option>
                                                    </select>
                                                </div>
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-sm font-medium text-slate-300">Description</label>
                                                <input name="description" required type="text" className="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white outline-none focus:ring-2 focus:ring-blue-500" placeholder="e.g. Bus 001 Diesel Refill" />
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-sm font-medium text-slate-300">Upload Receipt (Image)</label>
                                                <input name="receipt" required type="file" accept="image/*" className="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-500 transition-all" />
                                            </div>
                                            <button type="submit" disabled=${formLoading} className="w-full py-4 bg-blue-600 hover:bg-blue-500 disabled:opacity-50 disabled:cursor-not-allowed text-white rounded-xl font-bold transition-all flex items-center justify-center gap-2">
                                                ${formLoading && html`<${Loader2} className="w-5 h-5 animate-spin" />`}
                                                ${formLoading ? 'Uploading...' : 'Submit Expense'}
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            `}

                            ${/* Deployment Guide Section (Visible to Owner/Principal) */

                                <div className="mt-20 bg-slate-900 border border-slate-800 rounded-2xl p-8">
                                    <h3 className="text-2xl font-bold text-white mb-6">Production Deployment Guide</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8 text-sm">
                                        <div className="space-y-4">
                                            <h4 className="text-blue-400 font-bold uppercase tracking-wider">1. Firebase Setup</h4>
                                            <ul className="space-y-2 text-slate-400 list-disc pl-4">
                                                <li>Create project at <a href="https://console.firebase.google.com" target="_blank" className="text-blue-500 underline">Firebase Console</a></li>
                                                <li>Enable <b>Authentication</b> (Google & Email/Password)</li>
                                                <li>Enable <b>Cloud Firestore</b> (Start in production mode)</li>
                                                <li>Enable <b>Storage</b> (For receipt uploads)</li>
                                                <li>Copy Config to <code>firebaseConfig</code> in this file</li>
                                            </ul>
                                        </div>
                                        <div className="space-y-4">
                                            <h4 className="text-blue-400 font-bold uppercase tracking-wider">2. Firestore Rules</h4>
                                            <div className="bg-black p-4 rounded-lg font-mono text-xs text-slate-300 overflow-x-auto">
                                                <pre>${`rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    function isAuthenticated() { return request.auth != null; }
    function getRole() { return get(/databases/$(database)/documents/users/$(request.auth.uid)).data.role; }
    function getSchoolId() { return get(/databases/$(database)/documents/users/$(request.auth.uid)).data.schoolId; }
    
    match /schools/{schoolId} {
      allow read: if isAuthenticated();
      allow write: if getRole() == 'superadmin';
    }
    match /users/{userId} {
      allow read: if request.auth.uid == userId || getRole() == 'superadmin';
      allow write: if request.auth.uid == userId || getRole() == 'superadmin';
    }
    match /locations/{busId} {
      allow read: if isAuthenticated() && resource.data.schoolId == getSchoolId();
      allow write: if getRole() == 'driver' || getRole() == 'owner';
    }
    match /expenses/{id} {
      allow read: if isAuthenticated() && resource.data.schoolId == getSchoolId();
      allow write: if getRole() == 'accountant' || getRole() == 'owner';
    }
    match /students/{id} {
      allow read: if isAuthenticated() && resource.data.schoolId == getSchoolId();
      allow create: if true; // Public admission (validated by schoolId)
    }
  }
}`}</pre>
                                            </div>
                                        </div>
                                        <div className="space-y-4">
                                            <h4 className="text-blue-400 font-bold uppercase tracking-wider">3. Netlify/GitHub</h4>
                                            <ul className="space-y-2 text-slate-400 list-disc pl-4">
                                                <li>Push this <code>index.html</code> to a GitHub repo</li>
                                                <li>Connect repo to <a href="https://netlify.com" target="_blank" className="text-blue-500 underline">Netlify</a></li>
                                                <li>Set build command to <i>(empty)</i> and publish directory to <code>.</code></li>
                                                <li>Netlify will auto-deploy on every code change</li>
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                            `}
                        </main>
                    </div>
                `;
            };

            return html`
                <div className="min-h-screen bg-slate-950 text-slate-100 font-sans selection:bg-blue-500/30">
                    ${currentPage !== 'dashboard' && html`
                        <nav className="fixed top-0 left-0 right-0 z-50 bg-slate-950/80 backdrop-blur-md border-b border-slate-800">
                            <div className="container mx-auto px-6 py-4 flex items-center justify-between">
                                <div onClick=${() => setCurrentPage('home')} className="flex items-center gap-2 cursor-pointer group">

                                    <span className="text-2xl font-bold tracking-tight text-white">SchoolSphere</span>
                                </div>
                                <div className="hidden md:flex items-center gap-8">
                                    ${navItems.map((item) => html`
                                        <button key=${item.id} onClick=${() => { setCurrentPage(item.id); setFeedback(null); }} className=${`text-sm font-medium transition-all hover:text-blue-400 ${currentPage === item.id ? 'text-blue-400' : 'text-slate-400'}`}>${item.label}</button>
                                    `)}
                                    <button onClick=${() => { setCurrentPage('dashboard'); setFeedback(null); }} className="px-6 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-full text-sm font-bold transition-all">${user ? 'Dashboard' : 'Login'}</button>
                                </div>
                                <button className="md:hidden text-white" onClick=${() => setIsMenuOpen(!isMenuOpen)}>${isMenuOpen ? html`<${X} />` : html`<${Menu} />`}</button>
                            </div>
                            <${AnimatePresence}>
                                ${isMenuOpen && html`
                                    <${motion.div} initial=${{ opacity: 0, height: 0 }} animate=${{ opacity: 1, height: 'auto' }} exit=${{ opacity: 0, height: 0 }} className="md:hidden bg-slate-900 border-b border-slate-800 overflow-hidden">
                                        <div className="flex flex-col p-6 gap-4">
                                            ${navItems.map((item) => html`
                                                <button key=${item.id} onClick=${() => { setCurrentPage(item.id); setIsMenuOpen(false); setFeedback(null); }} className="flex items-center gap-4 text-lg font-medium text-slate-300 hover:text-blue-400 transition-all"><${item.icon} className="w-5 h-5" />${item.label}</button>
                                            `)}
                                            <button onClick=${() => { setCurrentPage('dashboard'); setIsMenuOpen(false); setFeedback(null); }} className="w-full py-3 bg-blue-600 text-white rounded-xl font-bold mt-4">${user ? 'Dashboard' : 'Login'}</button>
                                        </div>
                                    <//>
                                `}
                            <//>
                        </nav>
                    `}
                    <main className=${currentPage !== 'dashboard' ? 'pt-20' : ''}>
                        <${AnimatePresence} mode="wait">
                            <${motion.div} key=${currentPage} initial=${{ opacity: 0, y: 10 }} animate=${{ opacity: 1, y: 0 }} exit=${{ opacity: 0, y: -10 }} transition=${{ duration: 0.3 }}>
                                ${currentPage === 'home' && renderHome()}
                                ${currentPage === 'admission' && renderAdmissionForm()}
                                ${currentPage === 'contact' && renderContactForm()}
                                ${currentPage === 'dashboard' && renderDashboard()}
                            <//>
                        <//>
                    </main>
                    ${currentPage !== 'dashboard' && html`
                        <footer className="bg-slate-900 border-t border-slate-800 py-12">
                            <div className="container mx-auto px-6">
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-12 mb-12">
                                    <div className="col-span-1 md:col-span-2">
                                        <div className="flex items-center gap-2 mb-6"><div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center"><${GraduationCap} className="text-white w-5 h-5" /></div><span className="text-xl font-bold text-white">SchoolSphere</span></div>
                                        <p className="text-slate-400 max-w-md leading-relaxed">Leading the way in digital education management. Our platform provides everything you need to run a modern educational institution efficiently.</p>
                                    </div>
                                    <div>
                                        <h4 className="text-white font-bold mb-6">Quick Links</h4>
                                        <ul className="space-y-4 text-slate-400">
                                            <li><button onClick=${() => setCurrentPage('home')} className="hover:text-blue-400 transition-all">Home</button></li>
                                            <li><button onClick=${() => setCurrentPage('admission')} className="hover:text-blue-400 transition-all">Admissions</button></li>
                                            <li><button onClick=${() => setCurrentPage('contact')} className="hover:text-blue-400 transition-all">Contact</button></li>
                                            <li><button onClick=${() => setCurrentPage('dashboard')} className="hover:text-blue-400 transition-all">Dashboard</button></li>
                                        </ul>
                                    </div>
                                    <div>
                                        <h4 className="text-white font-bold mb-6">Connect</h4>
                                        <div className="flex gap-4">
                                            ${[1, 2, 3, 4].map((_, i) => html`
                                                <div key=${i} className="w-10 h-10 bg-slate-800 rounded-full flex items-center justify-center hover:bg-blue-600 transition-all cursor-pointer"><div className="w-5 h-5 bg-slate-400 rounded-sm" /></div>
                                            `)}
                                        </div>
                                    </div>
                                </div>
                                <div className="pt-8 border-t border-slate-800 text-center text-slate-500 text-sm">© 2026 SchoolSphere Education Management. All rights reserved.</div>
                            </div>
                        </footer>
                    `}
                </div>
            `;
        }

        const root = createRoot(document.getElementById('root'));
        root.render(React.createElement(ErrorBoundary, null, React.createElement(App)));

        // Service Worker Registration for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `
                    self.addEventListener('install', (event) => {
                        event.waitUntil(caches.open('sphere-v1').then((cache) => {
                            return cache.addAll(['./', './index.html']);
                        }));
                    });
                    self.addEventListener('fetch', (event) => {
                        event.respondWith(caches.match(event.request).then((response) => {
                            return response || fetch(event.request);
                        }));
                    });
                `;
                const blob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(blob);
                navigator.serviceWorker.register(swUrl).catch(err => console.log('SW registration failed:', err));
            });
        }
    </script>
</body>
</html>
