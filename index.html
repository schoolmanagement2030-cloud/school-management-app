<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SchoolSphere Pro - Digital Hub</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f2027">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root { 
    --gold: #FFD54F; 
    --bg-dark: #0f2027;
}

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at center, #2c5364, #203a43, #0f2027);
    color: white;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 50px;
}

/* --- Top Branding Section --- */
.branding {
    text-align: center;
    margin-bottom: 40px;
}

.app-name {
    font-size: 52px; /* बड़ा और बोल्ड नाम */
    font-weight: 900;
    color: var(--gold);
    margin: 0;
    text-shadow: 0 4px 10px rgba(0,0,0,0.5);
    letter-spacing: -1px;
}

.tagline {
    font-size: 16px;
    letter-spacing: 3px;
    color: #BDC3C7;
    margin-top: -5px;
    font-weight: 500;
    text-transform: uppercase;
}

/* --- Role Grid - Screen जैसा डिज़ाइन --- */
.role-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    width: 92%;
    max-width: 450px;
}

.role {
    position: relative;
    padding: 35px 15px; /* बटन बड़े और साफ़ */
    border-radius: 25px;
    border: none;
    color: white;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 6px 15px rgba(0,0,0,0.3);
}

.role:active { transform: scale(0.95); }

.role i { font-size: 32px; } /* बड़े आइकन */

/* Gradients as per your Screenshot */
.owner { 
    background: linear-gradient(135deg, #a445ed, #6225e6); 
    grid-column: span 2; 
}
.principal { background: linear-gradient(135deg, #2193b0, #6dd5ed); }
.accountant { background: linear-gradient(135deg, #f7971e, #ffd200); }
.teacher { background: linear-gradient(135deg, #11998e, #38ef7d); }
.driver { background: linear-gradient(135deg, #ee0979, #ff6a00); }
.parent { 
    background: linear-gradient(135deg, #ff9966, #ff5e62); 
    grid-column: span 2; 
}

/* Status Message */
#status-msg {
    margin-top: 30px;
    font-size: 18px;
    color: var(--gold);
    font-weight: 500;
    min-height: 25px;
}
</style>
</head>

<body>

<div class="branding">
    <h1 class="app-name">SchoolSphere</h1>
    <p class="tagline">THE DIGITAL SCHOOL HUB</p>
</div>

<div class="role-grid">

    <button class="role owner" onclick="go('owner')">
        <i class="fas fa-crown"></i>
        Owner
    </button>

    <button class="role principal" onclick="go('principal')">
        <i class="fas fa-university"></i>
        Principal
    </button>

    <button class="role accountant" onclick="go('accountant')">
        <i class="fas fa-sack-dollar"></i>
        Accountant
    </button>

    <button class="role teacher" onclick="go('teacher')">
        <i class="fas fa-chalkboard-user"></i>
        Teacher
    </button>

    <button class="role driver" onclick="go('driver')">
        <i class="fas fa-bus"></i>
        Driver
    </button>

    <button class="role parent" onclick="go('parent')">
        <i class="fas fa-user-graduate"></i>
        Parent / Student
    </button>

</div>

<div id="status-msg"></div>

<script>
// Navigation function
function go(role){
    const msg = document.getElementById("status-msg");
    const roleNames = {
        'owner': 'OWNER लॉगिन पेज पर जा रहे हैं...',
        'principal': 'PRINCIPAL पोर्टल खुल रहा है...',
        'accountant': 'ACCOUNTANT लॉगिन...',
        'teacher': 'TEACHER सेक्शन लोड हो रहा है...',
        'driver': 'DRIVER मोड ऑन हो रहा है...',
        'parent': 'STUDENT/PARENT पेज खुल रहा है...'
    };

    msg.innerText = roleNames[role] || "लोड हो रहा है...";

    setTimeout(()=>{
        window.location.href = "pages/" + role + ".html";
    }, 800);
}

// Service Worker
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
