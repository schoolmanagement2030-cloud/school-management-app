<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SchoolSphere Pro</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
:root { --gold: #FFD54F; }

body {
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background: radial-gradient(circle at center, #2c5364, #203a43, #0f2027);
    color:white;
    text-align:center;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

.logo { width: 100px; margin-bottom: 10px; }

.app-name {
    font-size: 42px;
    font-weight: 900;
    color: var(--gold);
}

.tagline {
    font-size: 14px;
    margin-bottom: 40px;
    color: #BDC3C7;
}

.role-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    width: 90%;
    max-width: 420px;
}

.role {
    padding: 20px;
    border-radius: 20px;
    border: none;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

.owner { background: purple; grid-column: span 2; }
.principal { background: blue; }
.accountant { background: orange; }
.teacher { background: green; }
.driver { background: pink; }
.parent { background: red; grid-column: span 2; }

#status-msg { margin-top: 15px; color: var(--gold); }
</style>
</head>

<body>

<img src="icon.png" class="logo">

<h1 class="app-name">SchoolSphere Pro</h1>
<p class="tagline">THE DIGITAL SCHOOL HUB</p>

<div class="role-grid">

<button class="role owner" onclick="go('owner')">👑 Owner</button>
<button class="role principal" onclick="go('principal')">🏢 Principal</button>
<button class="role accountant" onclick="go('accountant')">💰 Accountant</button>
<button class="role teacher" onclick="go('teacher')">👨‍🏫 Teacher</button>
<button class="role driver" onclick="go('driver')">🚌 Driver</button>
<button class="role parent" onclick="go('parent')">🎓 Student</button>

</div>

<div id="status-msg"></div>

<script>
// Firebase config (fill later)
const firebaseConfig = {
    apiKey: "",
    authDomain: "",
    databaseURL: "",
    projectId: ""
};

if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}

// Navigation
function go(role){
    document.getElementById("status-msg").innerText =
    role.toUpperCase() + " पेज खुल रहा है...";

    setTimeout(()=>{
        window.location.href = "pages/" + role + ".html";
    }, 1000);
}

// Service Worker
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
